<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Manajemen PAJ 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script>
tailwind.config = {
    theme: {
        extend: {
            fontFamily: { display: ['Playfair Display', 'serif'], body: ['Plus Jakarta Sans', 'sans-serif'] },
            colors: { pajRed: '#ef4444', pajRedDark: '#991b1b', dark: '#0f172a', card: '#1e293b', border: '#334155', muted: '#94a3b8', light: '#f8fafc', success: '#22c55e' },
            boxShadow: { 'glow': '0 0 20px rgba(239, 68, 68, 0.15)' }
        }
    }
}
</script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .sidebar { width: 280px; height: 100vh; background: linear-gradient(180deg, #2a1c1c, #1a1010); border-right: 1px solid #3f2b2b; position: fixed; left: 0; top: 0; z-index: 40; transition: transform .3s; overflow-y: auto; display: flex; flex-direction: column; }
    .sidebar-header { padding: 24px; border-bottom: 1px solid rgba(51, 65, 85, 0.3); background: rgba(30, 41, 59, 0.3); backdrop-filter: blur(10px); flex-shrink: 0; }
    .user-avatar { width: 48px; height: 48px; background: linear-gradient(135deg, #ef4444, #b91c1c); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); flex-shrink: 0; }
    
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 20px 16px; }
    .nav-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #fca5a5; margin: 24px 12px 12px 12px; padding-left: 12px; position: relative; }
    .nav-section-title::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 4px; height: 4px; border-radius: 50%; background-color: #ef4444; }
    
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; margin-bottom: 4px; border-radius: 8px; cursor: pointer; color: #cbd5e1; font-size: 14px; font-weight: 500; transition: all 0.2s ease; }
    .nav-item:hover { background: rgba(239, 68, 68, 0.1); color: #fff; transform: translateX(4px); }
    .nav-item.active { background: rgba(239, 68, 68, 0.2); color: #fca5a5; font-weight: 600; border-right: 3px solid #ef4444; }
    .nav-item.locked { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.8); }

    .sidebar-footer { padding: 20px; border-top: 1px solid rgba(51, 65, 85, 0.3); background: rgba(15, 23, 42, 0.6); flex-shrink: 0; }
    .main-content { margin-left: 280px; transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { position: sticky; top: 0; z-index: 30; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #334155; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 35; display: none; }
    .sidebar-overlay.active { display: block; }
    
    @media (max-width: 1023px) {
        .sidebar { transform: translateX(-100%); width: 280px; }
        .sidebar.mobile-open { transform: translateX(0); }
        .main-content { margin-left: 0 !important; }
    }

    .btn-primary { background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; font-weight: 700; padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(239, 68, 68, 0.5); filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    
    .btn-secondary { background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; color: #f1f5f9; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 14px; }
    .btn-secondary:hover { background: #334155; border-color: #475569; color: #fff; }
    
    .input-field { background: rgba(15, 23, 42, 0.6); border: 1px solid #334155; color: #f1f5f9; padding: 10px 14px; border-radius: 8px; width: 100%; font-size: 14px; transition: all 0.2s; }
    .input-field:focus { outline: none; border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1); background: rgba(15, 23, 42, 0.8); }

    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    
    .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #ef4444; animation: spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { position: fixed; top: 24px; right: 24px; z-index: 9999; padding: 16px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); max-width: 420px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.4); backdrop-filter: blur(8px); }
    .toast-success { background: rgba(34, 197, 94, 0.15); color: #86efac; border: 1px solid rgba(34, 197, 94, 0.3); }
    .toast-error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 100%); padding: 20px; }
    .auth-box { width: 100%; max-width: 520px; background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-header img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin: 0 auto 20px; display: block; border: 3px solid #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
    .auth-form-group { margin-bottom: 20px; }
    .auth-form-label { display: block; color: #94a3b8; font-size: 12px; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .auth-link { color: #ef4444; text-decoration: none; font-size: 13px; cursor: pointer; font-weight: 500; }
    .auth-link:hover { text-decoration: underline; color: #f87171; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.active { display: flex; }
    .modal-box { background: #1e293b; width: 90%; max-width: 600px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 0 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; max-height: 90vh; }
    .modal-header { padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 20px; overflow-y: auto; }
    .modal-footer { padding: 20px; border-top: 1px solid #334155; display: flex; justify-content: flex-end; gap: 10px; }

    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 4px 8px; border-radius: 6px; font-weight: 600; }
    .badge-red { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    .badge-blue { background: rgba(14, 165, 233, 0.15); color: #38bdf8; border: 1px solid rgba(14, 165, 233, 0.2); }
    .badge-amber { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }

    .hidden { display: none !important; }
    .text-pajRed { color: #ef4444; }

    /* PENAMBAHAN DARI KODE 1: WYSIWYG & CETAK */
    .editor-wrapper{border:1px solid #334155;border-radius:8px;overflow:hidden;background:#0f172a}
    .editor-toolbar{display:flex;flex-wrap:wrap;gap:2px;padding:6px 8px;background:#111b2a;border-bottom:1px solid #334155;align-items:center}
    .editor-toolbar button{background:rgba(255,255,255,0.05);border:1px solid transparent;color:#94a3b8;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;font-size:12px;transition:all .15s}
    .editor-toolbar button:hover{background:rgba(239,68,68,0.15);color:#ef4444;border-color:rgba(239,68,68,0.3)}
    .editor-toolbar select{background:#0f172a;border:1px solid #334155;color:#f1f5f9;padding:2px 4px;border-radius:4px;font-size:11px;cursor:pointer;height:28px}
    .editor-toolbar .separator{width:1px;height:20px;background:#334155;margin:0 4px}
    .editor-content{min-height:80px;padding:10px 12px;color:#f1f5f9;font-size:14px;line-height:1.5;outline:none;overflow-y:auto;max-height:200px}
    .editor-content:focus{box-shadow: inset 0 0 0 1px rgba(239,68,68,0.2)}
    .editor-content img{max-width:100%;height:auto}

    .print-preview-sheet{font-family:'Times New Roman',serif;font-size:12pt;line-height:1.6;color:#000;background:#fff}
    .print-preview-sheet .kop-area{display:flex;align-items:center;gap:14px;padding-bottom:10px;border-bottom:3px solid #000;margin-bottom:4px}
    .print-preview-sheet .kop-logo{height:80px;width:auto;flex-shrink:0;object-fit:contain}
    .print-preview-sheet .kop-text{flex:1;text-align:center}
    .print-preview-sheet .kop-text h1{font-size:13pt;font-weight:bold;margin:0;line-height:1.3;text-transform:uppercase}
    .print-preview-sheet .kop-text h2{font-size:11pt;font-weight:bold;margin:0;line-height:1.3;text-transform:uppercase}
    .print-preview-sheet .kop-text h3{font-size:14pt;font-weight:bold;margin:0;line-height:1.4;color:#c00}
    .print-preview-sheet .kop-sub{border-bottom:1px solid #000;padding-bottom:8px;margin-bottom:14px;text-align:center;font-size:10pt}
    .print-preview-sheet .petunjuk{font-size:11pt;margin-bottom:14px;padding:8px 10px;border:1px solid #888;border-radius:4px;background:#fafafa}
    .print-preview-sheet .petunjuk ol{margin-left:20px;margin-top:2px;margin-bottom:0}
    .print-preview-sheet .petunjuk ol li{margin-bottom:2px}
    .print-preview-sheet .soal-img{max-width:220px;max-height:110px;object-fit:contain;display:block;border-radius:2px;margin-bottom:6px}
    .print-preview-sheet .opt-img{max-height:40px;max-width:70px;object-fit:contain;vertical-align:middle;margin-left:8px;display:inline-block;border-radius:2px}
    .print-preview-sheet .section-title{border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:12px;font-size:13pt;font-weight:bold}
    .print-preview-sheet .soal-block{margin-bottom:16px;page-break-inside:avoid}
    .print-preview-sheet .ar-sunda-text{font-size:18pt; line-height:1.8;}
    .soal-flex-row{display:flex !important;align-items:flex-start !important;margin-bottom:4px !important;}
    .soal-num{font-weight:bold;min-width:28px;flex-shrink:0;padding-top:1px;}
    .soal-body{flex:1;line-height:1.6;}
    .opt-row{display:flex !important;align-items:baseline !important;margin-bottom:2px !important;}
    .opt-letter{font-weight:bold;min-width:22px;flex-shrink:0;margin-right:2px;}
    .opt-text{flex:1;line-height:1.6;}
    .urut-row{display:flex; align-items:flex-start; margin-bottom:6px;}
    .urut-num-box{border:1.5px solid #000; width:24px; height:24px; min-width:24px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:11pt; margin-right:8px; border-radius:2px;}
    .urut-text{flex:1; font-size:12pt; line-height:1.6; padding-top:1px;}
    
    .doc-print-area { font-family: 'Times New Roman', serif; color: #000; background: #fff; padding: 2cm; font-size: 11pt; line-height: 1.4; }
    .doc-print-area h2 { text-align: center; margin-bottom: 12px; font-size: 14pt; }
    .doc-print-area table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .doc-print-area th, .doc-print-area td { border: 1px solid #000; padding: 6px 8px; vertical-align: top; }
    .doc-print-area th { background: #f0f0f0; text-align: center; font-weight: bold; }

    .denah-cell { border: 1px solid #000; text-align: center; vertical-align: middle; padding: 2px; word-wrap: break-word; position: relative; cursor: grab; transition: background 0.2s; }
    .denah-cell:active { cursor: grabbing; }
    .denah-cell.drag-over { background: rgba(239, 68, 68, 0.2) !important; border: 2px dashed #ef4444 !important; }
    .denah-cell.dragging { opacity: 0.5; background: #334155 !important; }
    .denah-cell-empty { border: 1px solid #ddd; background: #f9f9f9; }

    @media print {
        .no-print, .sidebar, .sidebar-overlay, .topbar { display: none !important; }
        .main-content { margin-left: 0; padding: 0; }
        body { background: #fff; color: #000; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .card { border: none; box-shadow: none; padding: 0; }
        @page { size: A4; margin: 0; } 
    }

    table { width: 100%; border-collapse: collapse; }
    th { background: rgba(15, 23, 42, 0.5); color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 16px; text-align: left; font-weight: 600; }
    td { padding: 12px 16px; border-bottom: 1px solid #334155; color: #f1f5f9; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(51, 65, 85, 0.3); }
</style>
</head>
<body>
<div id="toastContainer"></div>

<div id="authSection" class="auth-container">
    <div id="loginForm" class="auth-box fade-in">
        <div class="auth-header">
            <img src="https://ui-avatars.com/api/?name=PAJ+2026&background=ef4444&color=fff" alt="Logo PAJ">
            <h1 class="text-2xl font-display font-bold text-pajRed leading-tight mb-2">DAAI SKOR BERSAMA<br>KOREK API</h1>
            <h2 class="text-lg font-bold text-light">PENILAIAN AKHIR JENJANG</h2>
            <p class="text-muted text-sm font-semibold tracking-wide">TAHUN 2026</p>
        </div>
        <div class="auth-form-group">
            <label class="auth-form-label">NIP / Username</label>
            <input type="text" id="loginUsername" class="input-field" placeholder="Masukkan NIP">
        </div>
        <div class="auth-form-group">
            <label class="auth-form-label">Password</label>
            <input type="password" id="loginPassword" class="input-field" placeholder="Masukkan Password" onkeydown="if(event.key==='Enter')handleLogin()">
        </div>
        <button onclick="handleLogin()" id="btnLogin" class="btn-primary w-full py-3 mb-4">MASUK</button>
        <div class="text-center">
            <span onclick="showAuth('register')" class="auth-link">Daftar Guru Baru</span>
        </div>
    </div>
    <div id="registerForm" class="auth-box hidden fade-in">
        <div class="auth-header">
            <img src="https://ui-avatars.com/api/?name=PAJ+2026&background=ef4444&color=fff" alt="Logo PAJ">
            <h1 class="text-2xl font-display font-bold text-pajRed leading-tight mb-2">DAAI SKOR BERSAMA<br>KOREK API</h1>
            <h2 class="text-lg font-bold text-light">PENILAIAN AKHIR JENJANG</h2>
            <p class="text-muted text-sm font-semibold tracking-wide">TAHUN 2026</p>
        </div>
        <div class="auth-form-group">
            <label class="auth-form-label"><i class="fas fa-map-marker-alt mr-2 text-pajRed"></i>Kecamatan <span class="text-danger">*</span></label>
            <select id="regKecamatan" class="input-field"><option value="">-- Memuat --</option></select>
        </div>
        <div class="auth-form-group">
            <label class="auth-form-label">NPSN Sekolah <span class="text-danger">*</span></label>
            <input type="text" id="regNpsn" class="input-field" placeholder="Contoh: 202xxxxx" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        </div>
        <div class="auth-form-group">
            <label class="auth-form-label">Nama Sekolah <span class="text-danger">*</span></label>
            <input type="text" id="regSekolah" class="input-field" placeholder="Nama Sekolah">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="auth-form-group">
                <label class="auth-form-label">Nama Guru <span class="text-danger">*</span></label>
                <input type="text" id="regNama" class="input-field" placeholder="Nama Lengkap">
            </div>
            <div class="auth-form-group">
                <label class="auth-form-label">NIP <span class="text-danger">*</span></label>
                <input type="text" id="regNip" class="input-field" placeholder="Nomor Induk">
            </div>
        </div>
        <div class="auth-form-group">
            <label class="auth-form-label">Jenis Guru <span class="text-danger">*</span></label>
            <select id="regJenis" class="input-field" onchange="toggleRegFields()">
                <option value="">-- Pilih --</option>
                <option value="kelas">Guru Kelas 6 (Wali)</option>
                <option value="pai">Guru PAI</option>
                <option value="pjok">Guru PJOK</option>
            </select>
        </div>
        <div id="regKelasGroup" class="hidden">
            <div class="auth-form-group">
                <label class="auth-form-label">Rombel</label>
                <select id="regRombelKelas" class="input-field">
                    <option value="">-- Pilih --</option><option value="A">Rombel A</option><option value="B">Rombel B</option><option value="C">Rombel C</option>
                </select>
            </div>
        </div>
        <div id="regRombelOnlyGroup" class="hidden">
            <div class="auth-form-group">
                <label class="auth-form-label">Rombel Pengampu</label>
                <select id="regRombelOnly" class="input-field">
                    <option value="">-- Pilih --</option><option value="A">Rombel A</option><option value="B">Rombel B</option><option value="C">Rombel C</option>
                </select>
            </div>
        </div>
        <div class="auth-form-group">
            <label class="auth-form-label">Password <span class="text-danger">*</span></label>
            <input type="password" id="regPass" class="input-field" placeholder="Min 6 karakter">
        </div>
        <button onclick="handleRegister()" id="btnReg" class="btn-primary w-full py-3 mb-4">DAFTAR SEKARANG</button>
        <div class="text-center">
            <span onclick="showAuth('login')" class="auth-link">Kembali ke Login</span>
        </div>
    </div>
</div>

<div id="mainPage" class="hidden">
<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <div class="flex items-center gap-3 mb-4">
            <div id="sidebarIcon" class="user-avatar"><i class="fas fa-graduation-cap"></i></div>
            <div class="flex-1 min-w-0">
                <h2 id="sidebarTitle" class="font-display font-bold text-sm text-white leading-tight truncate">SISTEM PAJ 2026</h2>
                <p id="sidebarSubtitle" class="text-pajRed text-xs font-bold tracking-wider mt-0.5">MANAJEMEN UJIAN</p>
            </div>
        </div>
        <div class="bg-black/20 rounded-lg p-2.5 border border-white/5">
            <div id="userInfoDisplay" class="text-xs text-muted font-medium mb-1">Loading...</div>
            <div id="kecBadgeSidebar" class="flex gap-1.5 flex-wrap"></div>
        </div>
    </div>
    <nav id="sidebarNav" class="sidebar-nav"></nav>
    <div class="sidebar-footer">
        <button onclick="handleLogout()" class="btn-secondary w-full text-xs font-semibold h-10 flex items-center justify-center gap-2 border-red-500/30 text-red-400 hover:bg-red-500/10 hover:text-red-300 hover:border-red-500/50">
            <i class="fas fa-sign-out-alt"></i> Keluar Aplikasi
        </button>
    </div>
</aside>

<div id="mainArea" class="main-content">
    <header class="topbar no-print">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-muted hover:text-white transition-colors p-2 rounded-lg hover:bg-white/5">
                <i class="fas fa-bars text-lg"></i>
            </button>
            <div>
                <h2 id="pageTitle" class="font-bold text-lg text-white leading-tight">Dashboard</h2>
                <p id="pageSubtitle" class="text-xs text-muted font-medium tracking-wide mt-0.5">Sistem Manajemen PAJ &mdash; 2026</p>
            </div>
        </div>
        <div id="kecBadgeTopbar" class="flex items-center gap-3"></div>
    </header>
    <div class="p-4 md:p-6 flex-1" id="pageContent"></div>
</div>
</div>

<div id="editKeyModal" class="modal-overlay">

function renderBankSoal(c){if(isFeatureLocked('bank-paj')){c.innerHTML=lockedPageHtml('bank-paj');return}if(c.dataset.rendered==='bank-paj'){renderBankList();return}c.innerHTML='<div class="fade-in card">'+scopeBarHtml()+'<h3 class="font-bold text-light mb-4 text-sm"><i class="fas fa-book-open text-pajRed mr-2"></i>Bank Soal PAJ <span class="text-blue-400 text-xs">(Sinkron DB Admin)</span></h3><div class="flex flex-wrap gap-4 mb-4"><select id="filterMapel" class="input-field w-48" onchange="renderBankList()">'+mapelOptionsHtml('',isSpecializedGuru())+'</select><select id="filterKelas" class="input-field w-48" onchange="renderBankList()">'+kelasOptionsHtml('')+'</select></div><div id="bankListContainer" class="space-y-3 max-h-[70vh] overflow-y-auto pr-2"></div></div>';c.dataset.rendered='bank-paj';setTimeout(function(){renderBankList()},50)}
function renderBankList(){
    var mapel=document.getElementById('filterMapel').value,
        kelas=document.getElementById('filterKelas').value,
        container=document.getElementById('bankListContainer');
    if(!container)return;
    
    var allQ=getMyQuestions();
    if(mapel) allQ=allQ.filter(function(q){return q.mapel===mapel});
    if(kelas) allQ=allQ.filter(function(q){return q.kelas===kelas});
    
    // PENGURUTAN: PG dan Urutan di atas, Uraian di bawah
    allQ.sort(function(a, b) {
        if (a.type === 'uraian' && b.type !== 'uraian') return 1;
        if (a.type !== 'uraian' && b.type === 'uraian') return -1;
        return 0;
    });
    
    if(!allQ.length){
        container.innerHTML='<div class="text-center py-10"><i class="fas fa-inbox text-3xl text-muted opacity-30 mb-3 block"></i><p class="text-muted">Tidak ada soal</p></div>';
        return;
    }

    container.innerHTML=allQ.map(function(q, idx){
        var tc=q.type==='uraian'?'border-blue-500':q.type==='urutan'?'border-info':'border-pajRed';
        var tb=q.type==='uraian'?'bg-blue-500/20 text-blue-400':q.type==='urutan'?'bg-info/20 text-info':'bg-pajRed/20 text-pajRed';
        var lb=q.type==='uraian'?'URAIAN':q.type==='urutan'?'URUTAN':'PG';
        var kt=q.correctKey||q.answer;
        var keyBadge=kt?'<span class="bg-pajRed/20 text-pajRed text-xs px-2 py-0.5 rounded font-bold border border-pajRed/40">Kunci: '+kt+'</span>':'<span class="bg-amber/20 text-amber text-xs px-2 py-0.5 rounded font-bold border border-amber/40"><i class="fas fa-exclamation-triangle mr-1"></i>Belum</span>';
        
        var cleanText = q.text || ''; 
        
        return'<div class="p-4 bg-dark/30 rounded-lg border-l-4 '+tc+' hover:bg-dark/50 transition-colors mb-3" style="min-width:0; overflow:hidden; word-break:break-word;">'+
            '<div class="flex items-start gap-3">'+
                '<div class="font-bold text-light text-sm pt-0.5">'+(idx+1)+'.</div>'+
                '<div class="flex-1 min-w-0">'+
                    '<div class="flex gap-2 mb-1 flex-wrap items-center">'+
                        '<span class="text-xs px-2 py-0.5 rounded '+tb+' font-semibold">'+lb+'</span>'+
                        '<span class="text-xs text-muted">'+getMapelName(q.mapel)+'</span>'+
                        keyBadge+
                    '</div>'+
                    '<div class="text-sm leading-relaxed text-light">'+cleanText+'</div>'+
                    (q.image?'<div class="mt-2"><img src="'+q.image+'" style="max-height:120px; max-width:100%; display:block; border-radius:4px;" alt="Gambar"></div>':'')+
                '</div>'+
            '</div>'+
        '</div>';
    }).join('');
}

function buildPetunjukHtml(hasPg,hasUr){var h='<div class="petunjuk"><p><b>Petunjuk Umum:</b></p><ol>';if(hasPg)h+='<li>Pilihan Ganda: Pilihlah satu jawaban paling tepat.</li>';if(hasUr)h+='<li>Uraian: Jawablah dengan jelas dan tepat.</li>';h+='</ol></div>';return h;}

function renderPrint(c){ c.innerHTML='<div class="fade-in card">'+scopeBarHtml()+'<h3 class="font-bold text-light mb-4 text-sm"><i class="fas fa-print mr-2 text-muted"></i>Cetak Soal PAJ <span class="text-blue-400 text-xs">(Format KOP)</span></h3><div class="flex flex-wrap gap-4 mb-4"><select id="printMapel" class="input-field w-48" onchange="renderPrintPreview()">'+mapelOptionsHtml('',isSpecializedGuru())+'</select><select id="printKelas" class="input-field w-48" onchange="renderPrintPreview()">'+kelasOptionsHtml(currentUser.kelas)+'</select><button onclick="doPrintSoal()" class="btn-primary"><i class="fas fa-print mr-2"></i>Cetak Naskah</button></div><div id="printPreviewContainer" class="bg-gray-400 p-4 md:p-8 rounded-lg overflow-x-auto"></div></div>'; setTimeout(renderPrintPreview,100); }

function renderPrintPreview(){
    var m=document.getElementById('printMapel'), c=document.getElementById('printPreviewContainer'); if(!m) return;
    var mv=m.value; if(!mv){ c.innerHTML='<p class="text-center text-muted py-20 bg-white rounded">Pilih mapel</p>'; return; }
    var data=getMyQuestions().filter(function(q){return q.mapel===mv}); 
    var pg=data.filter(function(q){return q.type==='pg';}), ur=data.filter(function(q){return q.type==='uraian';}), urt=data.filter(function(q){return q.type==='urutan';});
    var kecNama=getKecNama(currentUser.kecamatanId);
    var h='<div class="print-preview-sheet bg-white text-black shadow-2xl rounded-lg mx-auto" style="width:210mm;min-height:297mm;padding:2cm">';
    h+=buildKopHtml(kecNama); h+=buildPetunjukHtml(pg.length>0||urt.length>0, ur.length>0);
    
    var num=1;
    if(pg.length||urt.length){
        h+='<div class="section-title">I. Pilihan Ganda / Menjodohkan</div>';
        pg.forEach(function(q){
            var qText=processSpecialLang(forceSingleLine(q.text||''),mv); // Sama persis Kode 1
            h+='<div class="soal-block">';
            h+='<div class="soal-flex-row"><div class="soal-num">'+(num++)+'.</div><div class="soal-body">';
            if(q.image) h+='<img src="'+q.image+'" class="soal-img">';
            h+=qText+'</div></div>';
            h+='<div style="margin-left:28px;">';
            getOptLetters().forEach(function(L){
                var optTxt=q['opt'+L]||''; var optImg=q['optImg'+L]||'';
                if(optTxt||optImg){
                    optTxt=processSpecialLang(cleanInlineText(optTxt),mv); // Sama persis Kode 1
                    h+='<div class="opt-row"><div class="opt-letter">'+L+'.</div><div class="opt-text">'+optTxt;
                    if(optImg) h+=' <img src="'+optImg+'" class="opt-img">';
                    h+='</div></div>';
                }
            });
            h+='</div></div>';
        });
        
        urt.forEach(function(q){
            var qText=processSpecialLang(forceSingleLine(q.text||''),mv);
            h+='<div class="soal-block">';
            h+='<div class="soal-flex-row"><div class="soal-num">'+(num++)+'.</div><div class="soal-body">';
            if(q.image) h+='<img src="'+q.image+'" class="soal-img">';
            h+=qText+'</div></div>';
            if(q.statements&&q.statements.length>0){
                h+='<div style="margin-left:28px;margin-top:8px;">';
                q.statements.forEach(function(stmt,idx){
                    var stmtText=processSpecialLang(cleanInlineText(stmt),mv);
                    h+='<div class="urut-row"><div class="urut-num-box">'+(idx+1)+'</div><div class="urut-text">'+stmtText+'</div></div>';
                });
                h+='</div>';
            }
            h+='</div>';
        });
    }
    
    if(ur.length){
        h+='<div class="section-title" style="margin-top:16px">II. Uraian</div>';
        ur.forEach(function(q){
            var qText=processSpecialLang(forceSingleLine(q.text||''),mv);
            h+='<div class="soal-block">';
            h+='<div class="soal-flex-row"><div class="soal-num">'+(num++)+'.</div><div class="soal-body">';
            if(q.image) h+='<img src="'+q.image+'" class="soal-img">';
            h+=qText+'</div></div>';
            h+='</div>';
        });
    }
    h+='</div>'; c.innerHTML=h;
}

function doPrintSoal(){var s=document.querySelector('.print-preview-sheet');if(!s){showToast('Tidak ada preview','error');return;}var f=document.createElement('iframe');f.style.cssText='position:fixed;left:-9999px;top:0;width:210mm;height:297mm';document.body.appendChild(f);var d=f.contentDocument||f.contentWindow.document;d.open();d.write('<!DOCTYPE html><html><head><style>'+PRINT_CSS+'</style></head><body>');d.write(s.innerHTML);d.write('</body></html>');d.close();setTimeout(function(){f.contentWindow.focus();f.contentWindow.print();setTimeout(function(){document.body.removeChild(f);},3000);},500);}

/* ==================== KUNCI JAWABAN (SINKRON ADMIN) ==================== */
function renderKunciJawaban(c){ c.innerHTML='<div class="fade-in card">'+scopeBarHtml()+'<h3 class="font-bold text-light mb-4 text-sm"><i class="fas fa-key mr-2 text-blue-400"></i>Kunci Jawaban PAJ <span class="text-blue-400 text-xs">(Sinkron DB Admin)</span></h3><div class="flex flex-wrap gap-4 mb-4"><select id="kunciMapel" class="input-field w-48" onchange="renderKunciList()">'+mapelOptionsHtml('',isSpecializedGuru())+'</select><select id="kunciKelas" class="input-field w-48" onchange="renderKunciList()">'+kelasOptionsHtml(currentUser.kelas)+'</select><button onclick="printDocFromView(\'kunciViewArea\')" class="btn-primary"><i class="fas fa-print mr-2"></i>Cetak</button></div><div id="kunciListContainer"></div></div>'; renderKunciList(); }
function renderKunciList(){ var container=document.getElementById('kunciListContainer');if(!container)return;var mapel=document.getElementById('kunciMapel').value,kelas=document.getElementById('kunciKelas').value; var allQ=getMyQuestions(); if(mapel)allQ=allQ.filter(function(q){return q.mapel===mapel});if(kelas)allQ=allQ.filter(function(q){return q.kelas===kelas}); if(!allQ.length){container.innerHTML='<div class="text-center py-10 text-muted">Tidak ada soal.</div>';return} var h='<div id="kunciViewArea" class="doc-print-area shadow-2xl rounded-lg overflow-x-auto mt-4"><h2>Kunci Jawaban PAJ - '+getMapelName(mapel)+'</h2><table><thead><tr><th style="width:30px;">No</th><th style="width:100px;">Tipe</th><th>Kunci Jawaban</th><th style="width:60px;">Skor</th></tr></thead><tbody>'; allQ.forEach(function(q,i){var bentuk=q.type==='pg'?'PG':q.type==='urutan'?'Urutan':'Uraian';h+='<tr><td style="text-align:center;">'+(i+1)+'</td><td style="text-align:center;">'+bentuk+'</td><td style="text-align:center;font-weight:bold;">'+escHtml((q.answer||q.correctKey||'-').toUpperCase())+'</td><td style="text-align:center;">'+(q.score||1)+'</td></tr>'});h+='</tbody></table></div>';container.innerHTML=h; }

// Fungsi Cetak Universal
function printDocFromView(elementId){var s=document.getElementById(elementId);if(!s){showToast('Dokumen tidak ditemukan','error');return;}var f=document.createElement('iframe');f.style.cssText='position:fixed;left:-9999px;top:0;width:210mm;height:297mm';document.body.appendChild(f);var d=f.contentDocument||f.contentWindow.document;d.open();d.write('<!DOCTYPE html><html><head><style>body{font-family:"Times New Roman",serif;font-size:11pt;line-height:1.4;color:#000;background:#fff;margin:0;padding:2cm;}h2{text-align:center;margin-bottom:12px;font-size:14pt;}table{width:100%;border-collapse:collapse;margin-bottom:20px;}th,td{border:1px solid #000;padding:6px 8px;vertical-align:top;}th{background:#f0f0f0;text-align:center;font-weight:bold;}@media print{@page{margin:2cm}}</style></head><body>');d.write(s.innerHTML);d.write('</body></html>');d.close();setTimeout(function(){f.contentWindow.focus();f.contentWindow.print();setTimeout(function(){document.body.removeChild(f);},3000);},500);}

/* ==================== INISIALISASI & REALTIME LISTENER ==================== */
function initApp(){
    dbSAT.collection('kecamatan').onSnapshot(function(snap){ kecamatanList=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())}); populateRegKecDropdown(); });

    dbSAT.collection('teachers').onSnapshot(function(snap){
        allTeachersCache=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
        var uniqueSchools={}; allTeachersCache.forEach(function(t){ if(t.npsn && t.namaSekolah && !uniqueSchools[t.npsn]){ uniqueSchools[t.npsn] = {npsn:t.npsn, sekolah:t.namaSekolah, kec:t.kecamatanId}; } }); allSchoolsList=Object.values(uniqueSchools);
        if(isSuperAdmin() && document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='admin-guru') renderGuruTable();
        if(!isSuperAdmin() && document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='pengawas-paj') renderPengawasList();
    });
    
    if(currentUser && currentUser.kecamatanId){
        dbSAT.collection('pengawas_paj').where('kecSekolahId', '==', currentUser.kecamatanId).onSnapshot(function(snap){ pengawasList=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())}); if(document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='pengawas-paj') renderPengawasList(); });

        dbSAT.collection('students').where('kecamatanId', '==', currentUser.kecamatanId).onSnapshot(function(snap){ students=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())}); var activePage = document.querySelector('.nav-item.active'); if(activePage && (activePage.dataset.page==='data-siswa' || activePage.dataset.page==='dashboard' || activePage.dataset.page==='presensi-paj' || activePage.dataset.page==='denah-paj' || activePage.dataset.page==='kartu-paj')) refreshCurrentView(); });
        
        dbPAJ.collection('questions_paj').where('kecamatanId', '==', currentUser.kecamatanId).onSnapshot(function(snap){ questionsPAJ=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())}); var activePage = document.querySelector('.nav-item.active'); if(activePage && (activePage.dataset.page==='bank-paj' || activePage.dataset.page==='print-paj' || activePage.dataset.page==='kunci-paj' || activePage.dataset.page==='dashboard')) refreshCurrentView(); });

        dbSAT.collection('exam_tokens').where('kecamatanId', '==', currentUser.kecamatanId).onSnapshot(function(snap){ examTokens=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())}); if(document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='token-paj') renderTokenList(); });

        dbPAJ.collection('exam_results').where('kecamatanId', '==', currentUser.kecamatanId).onSnapshot(function(snap){ results=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())}); if(document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='koreksi-paj') renderKoreksiList(); });
        
        if(currentUser.npsn) {
            dbSAT.collection('denah_paj').where('npsn', '==', currentUser.npsn).onSnapshot(function(snap){
                savedDenahMap = {};
                snap.docs.forEach(function(doc){
                    var d = doc.data();
                    if(d.map) { Object.keys(d.map).forEach(function(key){ savedDenahMap[key] = d.map[key]; }); }
                });
                var activePage = document.querySelector('.nav-item.active');
                if(activePage && activePage.dataset.page==='denah-paj') updateDenahPreview();
            });
        }
    }
}

window.onload=function(){
    dbSAT.collection('kecamatan').orderBy('createdAt','asc').get().then(function(snap){
        kecamatanList=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
        populateRegKecDropdown(); showAuth('login');
    }).catch(function(e){ populateRegKecDropdown(); showAuth('login'); });
};
</script>
