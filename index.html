function getKecNama(id){if(!id)return'-';var k=kecamatanList.find(function(x){return x.id===id});return k?k.nama:'Tidak Dikenal'}

function handleLogin(){
    var u=document.getElementById('loginUsername').value.trim(),p=document.getElementById('loginPassword').value,btn=document.getElementById('btnLogin');
    if(!u||!p){showToast('Isi NIP dan Password','error');return}
    if(u===SUPER_ADMIN.nip&&p===SUPER_ADMIN.password){currentUser='admin';loginSuccess();return}
    btn.innerHTML='<span class="loading-spinner mr-2"></span>Proses...';btn.disabled=true;
    dbSAT.collection('teachers').get().then(function(snap){
        if(snap.empty){showToast('Database kosong!','error');btn.innerHTML='MASUK';btn.disabled=false;return}
        var found=false;snap.forEach(function(doc){var d=doc.data();if(d.nip==u&&d.password==p){found=true;currentUser=Object.assign({id:doc.id},d)}});
        if(found)loginSuccess();else{showToast('NIP atau Password salah!','error');btn.innerHTML='MASUK';btn.disabled=false}
    }).catch(function(e){showToast('Gagal: '+e.message,'error');btn.innerHTML='MASUK';btn.disabled=false});
}
function handleRegister(){
    var kecId=document.getElementById('regKecamatan').value,npsn=document.getElementById('regNpsn').value.trim(),sekolah=document.getElementById('regSekolah').value.trim(),nama=document.getElementById('regNama').value.trim(),nip=document.getElementById('regNip').value.trim(),jenis=document.getElementById('regJenis').value,pass=document.getElementById('regPass').value;
    if(!kecId||!npsn||!sekolah||!nama||!nip||!jenis||!pass){showToast('Lengkapi semua data','error');return}
    if(pass.length<6){showToast('Password min 6 karakter','error');return}
    var kelas='',rombel='';if(jenis==='kelas'){kelas='Kelas 6';rombel=document.getElementById('regRombelKelas').value;if(!rombel){showToast('Pilih Rombel','error');return}}else{rombel=document.getElementById('regRombelOnly').value;if(!rombel){showToast('Pilih Rombel','error');return}kelas='Kelas 1-6'}
    dbSAT.collection('teachers').where('nip','==',nip).get().then(function(s){if(!s.empty){showToast('NIP sudah terdaftar!','error');return}return dbSAT.collection('teachers').add({kecamatanId:kecId,npsn:npsn,namaSekolah:sekolah,namaGuru:nama,nip:nip,jenisGuru:jenis,kelas:kelas,rombel:rombel,password:pass,createdAt:firebase.firestore.FieldValue.serverTimestamp()})}).then(function(r){if(r){showToast('Registrasi Berhasil!','success');showAuth('login')}}).catch(function(e){showToast('Error: '+e.message,'error')});
}

    } else {
        document.getElementById('sidebarIcon').innerHTML='<i class="fas fa-graduation-cap"></i>';document.getElementById('sidebarIcon').className='user-avatar';document.getElementById('sidebarTitle').textContent='SISTEM PAJ';document.getElementById('sidebarSubtitle').textContent='TAHUN 2026';var info=currentUser.namaGuru+' ('+({kelas:'Wali Kelas 6',pai:'Guru PAI',pjok:'Guru PJOK'}[currentUser.jenisGuru]||currentUser.jenisGuru)+' Rombel '+currentUser.rombel+')';document.getElementById('userInfoDisplay').textContent=info;var kn=getKecNama(currentUser.kecamatanId);document.getElementById('kecBadgeSidebar').innerHTML='<span class="badge badge-amber"><i class="fas fa-map-marker-alt mr-1"></i>'+escHtml(kn)+'</span> <span class="badge badge-blue"><i class="fas fa-school mr-1"></i>'+escHtml(currentUser.npsn)+'</span>';document.getElementById('kecBadgeTopbar').innerHTML='<span class="badge badge-blue"><i class="fas fa-school mr-1"></i>NPSN '+escHtml(currentUser.npsn)+'</span><span class="text-xs text-green-400 ml-2"><i class="fas fa-wifi mr-1"></i>Online</span>';dbSAT.collection('settings').doc('feature_locks').onSnapshot(function(doc){var oldLocks=Object.assign({},featureLocks);if(doc.exists)featureLocks=doc.data().locks||{};else featureLocks={};if(JSON.stringify(oldLocks)!==JSON.stringify(featureLocks)){buildSidebar();checkCurrentPageLocked()}});showToast('Selamat Datang, '+currentUser.namaGuru,'success');

var denahArranged = []; // Menyimpan state posisi siswa di denah

function renderDenahPAJ(c){if(c.dataset.rendered==='denah-paj'){return}c.innerHTML='<div class="fade-in no-print"><div class="card mb-6">'+scopeBarHtml()+'<h3 class="font-bold text-light mb-4 text-sm"><i class="fas fa-chair mr-2 text-pajRed"></i>Denah Duduk PAJ (Spiral Ular)</h3><p class="text-xs text-muted mb-4"><i class="fas fa-info-circle mr-1"></i>Tekan dan geser kartu siswa untuk menukar posisi sesuai kebutuhan.</p><div class="flex flex-wrap gap-4 mb-4 items-end"><div><label class="text-xs text-muted mb-1 block">Pilih Kelas</label><select id="denahKelas" class="input-field w-40" onchange="updateDenahPreview()"><option value="">-- Kelas --</option>'+KELAS_LIST.map(function(k){return'<option value="'+k+'">'+k+'</option>'}).join('')+'</select></div><div><label class="text-xs text-muted mb-1 block">Nama Ruang</label><input type="text" id="denahRuang" class="input-field w-48" placeholder="Contoh: Ruang A" value="Ruang A"></div><button onclick="printDenahPAJ()" class="btn-primary bg-gradient-to-r from-red-600 to-red-700 border-0 text-white"><i class="fas fa-print mr-2"></i>Cetak Denah</button></div></div><div id="denahPreview" class="denah-preview"></div></div>';c.dataset.rendered='denah-paj'}

function updateDenahPreview(){
    var kelas=document.getElementById('denahKelas').value,ruang=document.getElementById('denahRuang').value,container=document.getElementById('denahPreview');
    if(!kelas){container.innerHTML='<div class="text-muted p-4 text-center">Pilih kelas untuk melihat denah.</div>';return}
    var list=getMyStudentsRombel(currentUser.rombel).filter(function(s){return s.kelas===kelas});
    if(!list.length){container.innerHTML='<div class="text-pajRed p-4 text-center">Tidak ada siswa</div>';return}
    
    var listA=list.slice(0,16);
    var listB=list.slice(16);
    var spiralMap=[1,2,3,4,8,7,6,5,9,10,11,12,16,15,14,13];
    
    var genRoom=function(name, items, isSecondRoom, roomIndex){
        // Inisialisasi array posisi jika belum ada atau jumlah siswa berubah
        if(!denahArranged[roomIndex] || denahArranged[roomIndex].length !== 16){
            denahArranged[roomIndex] = new Array(16).fill(null);
            for(var i=0;i<items.length;i++){
                var targetPos=isSecondRoom?(16-i):(i+1);
                var physicalPos=spiralMap.indexOf(targetPos);
                if(physicalPos!==-1) denahArranged[roomIndex][physicalPos]=items[i];
            }
        }

        var h='<div style="width:100%;max-width:400px;border:2px solid #000;padding:10px;box-sizing:border-box;background:#fff;color:#000;margin:0 auto;page-break-inside:avoid;">';
        h+='<div style="text-align:center;font-weight:bold;font-size:14pt;margin-bottom:10px;text-decoration:underline;font-family:Arial,sans-serif;">'+name+' ('+items.length+' Siswa)</div>';
        h+='<table style="width:100%;border-collapse:collapse;table-layout:fixed;font-family:Arial,sans-serif;">';
        
        for(var row=0;row<4;row++){
            h+='<tr>';
            for(var col=0;col<4;col++){
                var idx=(row*4)+col;
                var s=denahArranged[roomIndex][idx];
                var posNum=spiralMap[idx];
                
                if(s){
                    h+='<td class="denah-cell" draggable="true" data-room="'+roomIndex+'" data-idx="'+idx+'">';
                    h+='<div style="font-size:7pt;color:#333;border-bottom:1px solid #ccc;margin-bottom:2px;font-weight:bold;">'+posNum+'</div>';
                    h+='<div style="font-size:8pt;font-weight:bold;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escHtml(s.nama)+'</div>';
                    h+='<div style="font-size:6pt;color:#666;margin-top:1px;">'+(s.pesertaUjian||s.nisn||'-')+'</div>';
                    h+='</td>';
                } else {
                    h+='<td class="denah-cell-empty"></td>';
                }
            }
            h+='</tr>';
        }
        h+='</table></div>';
        return h;
    };

    var out='<div style="display:flex;gap:20px;flex-wrap:wrap;justify-content:center;">';
    if(listA.length>0) out+=genRoom(ruang+' (Utama)',listA,false,0);
    if(listB.length>0) out+=genRoom(ruang+' (Tambahan)',listB,true,1);
    out+='</div>';
    container.innerHTML=out;
    
    // Pasang Event Listener Drag & Drop
    setupDenahDragDrop();
}

function setupDenahDragDrop(){
    var dragEl = null;
    
    function handleDragStart(e) {
        dragEl = this;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', ''); // Required for Firefox
    }

    function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        this.classList.add('drag-over');
    }

    function handleDragLeave(e) {
        this.classList.remove('drag-over');
    }

    function handleDrop(e) {
        e.preventDefault();
        this.classList.remove('drag-over');
        
        if (dragEl !== this) {
            // Tukar data di array state
            var roomIdx = parseInt(this.getAttribute('data-room'));
            var targetIdx = parseInt(this.getAttribute('data-idx'));
            var sourceIdx = parseInt(dragEl.getAttribute('data-idx'));
            
            // Cek apakah satu ruangan yang sama
            if(parseInt(dragEl.getAttribute('data-room')) === roomIdx){
                var temp = denahArranged[roomIdx][targetIdx];
                denahArranged[roomIdx][targetIdx] = denahArranged[roomIdx][sourceIdx];
                denahArranged[roomIdx][sourceIdx] = temp;
                
                // Tukar DOM secara visual
                var targetHTML = this.innerHTML;
                var sourceHTML = dragEl.innerHTML;
                this.innerHTML = sourceHTML;
                dragEl.innerHTML = targetHTML;
                
                // Jika target kosong, kembalikan jasi cell kosong
                if(!denahArranged[roomIdx][sourceIdx]){
                    dragEl.className = 'denah-cell-empty';
                    dragEl.removeAttribute('draggable');
                }
                if(!denahArranged[roomIdx][targetIdx]){
                    this.className = 'denah-cell-empty';
                    this.removeAttribute('draggable');
                }
                showToast('Posisi siswa berhasil ditukar!','success');
            }
        }
    }

    function handleDragEnd(e) {
        this.classList.remove('dragging');
        var cells = document.querySelectorAll('.denah-cell');
        cells.forEach(function(cell){ cell.classList.remove('drag-over'); });
    }

    var cells = document.querySelectorAll('.denah-cell');
    cells.forEach(function(cell) {
        cell.addEventListener('dragstart', handleDragStart);
        cell.addEventListener('dragover', handleDragOver);
        cell.addEventListener('dragleave', handleDragLeave);
        cell.addEventListener('drop', handleDrop);
        cell.addEventListener('dragend', handleDragEnd);
    });
}

    document.body.appendChild(iframe);
    var doc=iframe.contentDocument||iframe.contentWindow.document;doc.open();

    if(denahArranged[1] && denahArranged[1].some(function(el){return el !== null})) doc.write(genPrintRoom(ruang+' (Tambahan)', 1));
    
    doc.write('</body></html>');doc.close();
    setTimeout(function(){iframe.contentWindow.focus();iframe.contentWindow.print();setTimeout(function(){try{document.body.removeChild(iframe)}catch(e){}},3000)},500);
}

function createToken(){
    var mapel=document.getElementById('tokenMapel').value,
    kelas=document.getElementById('tokenKelas').value,
    durasi=parseInt(document.getElementById('tokenDurasi').value) || 0;
    
    if(!mapel||!kelas){showToast('Pilih Mapel dan Kelas','error');return}
    if(durasi <= 0){showToast('Masukkan durasi waktu yang valid','error');return}
    
    var chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    var token='';
    for(var i=0;i<6;i++)token+=chars.charAt(Math.floor(Math.random()*chars.length));
    
    dbSAT.collection('exam_tokens').add({
        token:token,
        isPAJ:true,
        mapel:mapel,
        kelas:kelas,
        durasiMenit:durasi, // Menyimpan durasi menit
        kecamatanId:currentUser.kecamatanId,
        npsn:currentUser.npsn,
        rombel:currentUser.rombel,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
    }).then(function(){
        showToast('Token '+token+' berhasil dibuat! ('+durasi+' Menit)','success');
    }).catch(function(e){
        showToast('Gagal: '+e.message,'error');
    });
}

function renderTokenList(){
    var container=document.getElementById('tokenListContainer');
    if(!container)return;
    var tokens=getMyTokens().filter(function(t){return t.isPAJ===true});
    if(!tokens.length){
        container.innerHTML='<div class="text-center py-10 text-muted">Belum ada token.</div>';
        return;
    }
    container.innerHTML=tokens.map(function(t){
        var durasiText = t.durasiMenit ? t.durasiMenit + ' Menit' : '-';
        return'<div class="p-3 bg-dark/30 rounded border-l-4 border-pajRed flex justify-between items-center">'+
            '<div>'+
                '<span class="font-mono font-bold text-lg text-pajRed tracking-widest">'+t.token+'</span>'+
                '<div class="text-xs text-muted mt-1">'+
                    getMapelName(t.mapel)+' &bull; '+t.kelas+' &bull; <span class="text-warning font-bold">'+durasiText+'</span>'+
                '</div>'+
            '</div>'+
            '<button onclick="deleteToken(\''+t.id+'\')" class="btn-secondary text-xs border-pajRed/50 text-pajRed hover:bg-pajRed/10"><i class="fas fa-trash"></i></button>'+
        '</div>';
    }).join('');
}

function openEditNilaiModal(resId){var r=results.find(function(x){return x.id===resId});if(!r)return;var modal=document.getElementById('editNilaiModalKu');modal.dataset.resId=resId;modal.dataset.isPaj='true';var valPG=r.nilaiPG||r.scorePG||r.pgScore||r.pg||0;var valUraian=r.nilaiUraian||r.scoreUraian||r.uraianScore||r.essayScore||r.uraian||0;document.getElementById('editModalContent').innerHTML='<div class="space-y-4"><div><label class="text-xs text-muted block mb-1">Nilai PG (Otomatis)</label><input type="number" id="editValPG" class="input-field" value="'+Math.round(valPG)+'" min="0" max="100"></div><div><label class="text-xs text-muted block mb-1">Nilai Uraian (Input Manual)</label><input type="number" id="editValUraian" class="input-field border-warning" value="'+Math.round(valUraian)+'" min="0" max="100" placeholder="Masukkan nilai uraian 0-100"></div></div>';modal.classList.add('active')}

function saveEditNilai(){var modal=document.getElementById('editNilaiModalKu');var resId=modal.dataset.resId;var isPAJ=modal.dataset.isPaj==='true';var pg=Number(document.getElementById('editValPG').value)||0;var ur=Number(document.getElementById('editValUraian').value)||0;var nilaiAkhir=isPAJ?((pg*0.7)+(ur*0.3)):pg;dbPAJ.collection('exam_results').doc(resId).update({nilaiPG:Math.round(pg),scorePG:Math.round(pg),nilaiUraian:Math.round(ur),scoreUraian:Math.round(ur),essayScore:Math.round(ur),nilaiAkhir:Math.round(nilaiAkhir),score:Math.round(nilaiAkhir),dikoreksi:true}).then(function(){showToast('Berhasil dikoreksi! Nilai: '+Math.round(nilaiAkhir),'success');closeEditNilaiModal()}).catch(function(e){showToast('Gagal: '+e.message,'error')})}

function renderPrint(c){c.innerHTML='<div class="fade-in card">'+scopeBarHtml()+'<h3 class="font-bold text-light mb-4 text-sm"><i class="fas fa-print mr-2 text-muted"></i>Cetak Naskah PAJ</h3>'+'<div class="flex flex-wrap gap-4 mb-4"><select id="printMapel" class="input-field w-48">'+mapelOptionsHtml('',isSpecializedGuru())+'</select><select id="printKelas" class="input-field w-48">'+kelasOptionsHtml(currentUser.kelas)+'</select><button onclick="printNaskah()" class="btn-primary"><i class="fas fa-print mr-2"></i>Cetak</button></div>'+'<div id="printPreviewList" class="space-y-3 max-h-[60vh] overflow-y-auto"></div></div>';renderPrintPreview()}
function renderPrintPreview(){var container=document.getElementById('printPreviewList');if(!container)return;var mapel=document.getElementById('printMapel').value,kelas=document.getElementById('printKelas').value;var allQ=getMyQuestions();if(mapel)allQ=allQ.filter(function(q){return q.mapel===mapel});if(kelas)allQ=allQ.filter(function(q){return q.kelas===kelas});if(!allQ.length){container.innerHTML='<div class="text-center py-10 text-muted">Tidak ada soal untuk dicetak.</div>';return}container.innerHTML=allQ.map(function(q,i){return'<div class="p-3 bg-dark/30 rounded border-l-4 '+(q.type==='pg'?'border-pajRed':'border-info')+'"><b class="text-muted mr-2">'+(i+1)+'.</b> <span class="text-light">'+escHtml(q.text)+'</span>'+(q.type==='pg'?'<div class="grid grid-cols-2 gap-2 mt-2 ml-6 text-xs text-muted"><div>A. '+(q.optA||'-')+'</div><div>B. '+(q.optB||'-')+'</div><div>C. '+(q.optC||'-')+'</div><div>D. '+(q.optD||'-')+'</div></div>':'')+'</div>'}).join('')}
function printNaskah(){var mapel=document.getElementById('printMapel').value,kelas=document.getElementById('printKelas').value;var allQ=getMyQuestions();if(mapel)allQ=allQ.filter(function(q){return q.mapel===mapel});if(kelas)allQ=allQ.filter(function(q){return q.kelas===kelas});if(!allQ.length){showToast('Tidak ada soal','error');return}var iframe=document.createElement('iframe');iframe.style.cssText='position:fixed;left:-9999px;top:0;width:210mm;height:297mm';document.body.appendChild(iframe);var doc=iframe.contentDocument||iframe.contentWindow.document;doc.open();
    doc.write('<!DOCTYPE html><html><head><title>Naskah Soal</title><style>@page{size:A4;margin:2cm}body{font-family:"Times New Roman",serif;font-size:12pt;line-height:1.6;color:#000}.q{margin-bottom:20px;page-break-inside:avoid}.opt{margin-left:30px;margin-top:5px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:5px}</style></head><body><h2 style="text-align:center;margin-bottom:0">NASKAH SOAL PAJ</h2><p style="text-align:center;margin-top:5px">'+getMapelName(mapel)+' - '+kelas+'</p><hr style="border:1px solid #000;margin-bottom:20px">');
    allQ.forEach(function(q,i){doc.write('<div class="q"><b>'+(i+1)+'.</b> '+escHtml(q.text)+(q.image?'<br><img src="'+q.image+'" style="max-width:300px;max-height:200px;margin-top:5px">':'')+'</div>');if(q.type==='pg'){doc.write('<div class="opt grid2"><div>A. '+escHtml(q.optA||'')+'</div><div>B. '+escHtml(q.optB||'')+'</div><div>C. '+escHtml(q.optC||'')+'</div><div>D. '+escHtml(q.optD||'')+'</div></div>')}else{doc.write('<div class="opt" style="border-bottom:1px dotted #000;height:80px"></div>')}});
    doc.write('</body></html>');doc.close();setTimeout(function(){iframe.contentWindow.focus();iframe.contentWindow.print();setTimeout(function(){try{document.body.removeChild(iframe)}catch(e){}},3000)},500);
}

/* ==================== KUNCI JAWABAN ==================== */
function renderKunciJawaban(c){
    c.innerHTML='<div class="fade-in card">'+scopeBarHtml()+'<h3 class="font-bold text-light mb-4 text-sm"><i class="fas fa-key mr-2 text-info"></i>Kunci Jawaban PAJ</h3>'+
    '<div class="flex flex-wrap gap-4 mb-4"><select id="kunciMapel" class="input-field w-48" onchange="renderKunciList()">'+mapelOptionsHtml('',isSpecializedGuru())+'</select><select id="kunciKelas" class="input-field w-48" onchange="renderKunciList()">'+kelasOptionsHtml(currentUser.kelas)+'</select><button onclick="printKunci()" class="btn-primary"><i class="fas fa-print mr-2"></i>Cetak</button></div><div id="kunciListContainer"></div></div>';
    renderKunciList();
}
function renderKunciList(){
    var container=document.getElementById('kunciListContainer');if(!container)return;var mapel=document.getElementById('kunciMapel').value,kelas=document.getElementById('kunciKelas').value;
    var allQ=getMyQuestions();if(mapel)allQ=allQ.filter(function(q){return q.mapel===mapel});if(kelas)allQ=allQ.filter(function(q){return q.kelas===kelas});
    if(!allQ.length){container.innerHTML='<div class="text-center py-10 text-muted">Tidak ada soal.</div>';return}
    var h='<table class="w-full text-sm"><thead><tr><th>No</th><th>Tipe</th><th>Soal (Singkat)</th><th class="text-center text-pajRed">Kunci</th></tr></thead><tbody>';
    allQ.forEach(function(q,i){var kt=q.correctKey||q.answer||'-';h+='<tr><td>'+(i+1)+'</td><td><span class="badge '+(q.type==='pg'?'badge-red':'badge-blue')+'">'+q.type.toUpperCase()+'</span></td><td class="truncate max-w-[200px]">'+escHtml(q.text)+'</td><td class="text-center font-bold text-pajRed">'+escHtml(kt)+'</td></tr>'});h+='</tbody></table>';container.innerHTML=h;
}
function printKunci(){
    var mapel=document.getElementById('kunciMapel').value,kelas=document.getElementById('kunciKelas').value;var allQ=getMyQuestions();if(mapel)allQ=allQ.filter(function(q){return q.mapel===mapel});if(kelas)allQ=allQ.filter(function(q){return q.kelas===kelas});if(!allQ.length){showToast('Tidak ada soal','error');return}
    var iframe=document.createElement('iframe');iframe.style.cssText='position:fixed;left:-9999px;top:0;width:210mm;height:297mm';document.body.appendChild(iframe);
    var doc=iframe.contentDocument||iframe.contentWindow.document;doc.open();
    doc.write('<!DOCTYPE html><html><head><title>Kunci Jawaban</title><style>@page{size:A4;margin:2cm}body{font-family:"Times New Roman",serif;font-size:11pt;color:#000}table{width:100%;border-collapse:collapse}th,td{border:1px solid #000;padding:8px;text-align:center}th{background:#f0f0f0}td:nth-child(3){text-align:left}</style></head><body><h2 style="text-align:center">KUNCI JAWABAN PAJ</h2><p style="text-align:center">'+getMapelName(mapel)+' - '+kelas+'</p><br><table><thead><tr><th>No</th><th>Tipe</th><th>Soal</th><th>Kunci</th></tr></thead><tbody>');
    allQ.forEach(function(q,i){doc.write('<tr><td>'+(i+1)+'</td><td>'+q.type.toUpperCase()+'</td><td style="text-align:left">'+escHtml(q.text)+'</td><td><b>'+(q.correctKey||q.answer||'-')+'</b></td></tr>')});
    doc.write('</tbody></table></body></html>');doc.close();
    setTimeout(function(){iframe.contentWindow.focus();iframe.contentWindow.print();setTimeout(function(){try{document.body.removeChild(iframe)}catch(e){}},3000)},500);
}

/* ==================== INISIALISASI & REALTIME LISTENER (PERBAIKAN UTAMA) ==================== */
function initApp(){
    // 1. Kecamatan (DB SAT - Data Master)
    dbSAT.collection('kecamatan').onSnapshot(function(snap){
        kecamatanList=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
        populateRegKecDropdown();
        if(isSuperAdmin() && document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='admin-kecamatan') renderAdminKecamatan(document.getElementById('pageContent'));
    });

    // 2. Guru & Data Sekolah (DB SAT - Data Master)
    dbSAT.collection('teachers').onSnapshot(function(snap){
        allTeachersCache=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
        var uniqueSchools={};
        allTeachersCache.forEach(function(t){ if(t.npsn && t.namaSekolah && !uniqueSchools[t.npsn]){ uniqueSchools[t.npsn] = {npsn:t.npsn, sekolah:t.namaSekolah, kec:t.kecamatanId}; } });
        allSchoolsList=Object.values(uniqueSchools);
        if(isSuperAdmin() && document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='admin-guru') renderGuruTable();
        if(document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='pengawas-paj') renderPengawasList();
    });
    
    if(currentUser && currentUser.kecamatanId){
        // 3. Pengawas (DB SAT - Data Operasional)
        dbSAT.collection('pengawas_paj').where('kecSekolahId', '==', currentUser.kecamatanId).onSnapshot(function(snap){
            pengawasList=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            if(document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='pengawas-paj') renderPengawasList();
        });

        // 4. Siswa (DB SAT - Data Master)
        dbSAT.collection('students').where('kecamatanId', '==', currentUser.kecamatanId).onSnapshot(function(snap){
            students=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            var activePage = document.querySelector('.nav-item.active');
            if(activePage && (activePage.dataset.page==='data-siswa' || activePage.dataset.page==='dashboard' || activePage.dataset.page==='presensi-paj' || activePage.dataset.page==='denah-paj' || activePage.dataset.page==='kartu-paj')) refreshCurrentView();
        });
        
        // 5. PERBAIKAN PENTING: Soal PAJ WAJIB ambil dari DB PAJ
        dbPAJ.collection('questions_paj').where('kecamatanId', '==', currentUser.kecamatanId).onSnapshot(function(snap){
            questionsPAJ=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            var activePage = document.querySelector('.nav-item.active');
            if(activePage && (activePage.dataset.page==='bank-paj' || activePage.dataset.page==='print-paj' || activePage.dataset.page==='kunci-paj' || activePage.dataset.page==='dashboard')) refreshCurrentView();
        });

        // 6. Token Ujian (DB SAT - Data Operasional)
        dbSAT.collection('exam_tokens').where('kecamatanId', '==', currentUser.kecamatanId).onSnapshot(function(snap){
            examTokens=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            if(document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='token-paj') renderTokenList();
        });

        // 7. PERBAIKAN PENTING: Hasil Ujian PAJ WAJIB ambil dari DB PAJ
        dbPAJ.collection('exam_results').where('kecamatanId', '==', currentUser.kecamatanId).onSnapshot(function(snap){
            results=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            if(document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='koreksi-paj') renderKoreksiList();
        });
    }
}

window.onload=function(){
    dbSAT.collection('kecamatan').orderBy('createdAt','asc').get().then(function(snap){
        kecamatanList=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
        populateRegKecDropdown();
        showAuth('login');
    }).catch(function(e){
        populateRegKecDropdown();
        showAuth('login');
    });
};
