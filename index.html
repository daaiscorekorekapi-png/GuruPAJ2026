function getMyQuestions(){
    var raw = questionsPAJ.filter(function(q){ return q.kecamatanId === currentUser.kecamatanId; });
    var letters = getOptLetters();
    return raw.map(function(q) {
        if(q.type === 'pg' && q.options && Array.isArray(q.options) && !q.optA) {
            letters.forEach(function(L, idx) { q['opt'+L] = q.options[idx] || ''; if(q.optionImages && Array.isArray(q.optionImages)) { q['optImg'+L] = q.optionImages[idx] || ''; } });
        }
        if(q.correctKey && !q.answer) q.answer = q.correctKey;
        if(q.answer && !q.correctKey) q.correctKey = q.answer;
        return q;
    });
}

function handleLogin(){
    var u=document.getElementById('loginUsername').value.trim(),p=document.getElementById('loginPassword').value,btn=document.getElementById('btnLogin');
    if(!u||!p){showToast('Isi NIP dan Password','error');return}
    if(u===SUPER_ADMIN.nip&&p===SUPER_ADMIN.password){currentUser='admin';loginSuccess();return}
    btn.innerHTML='<span class="loading-spinner mr-2"></span>Proses...';btn.disabled=true;
    dbSAT.collection('teachers').get().then(function(snap){
        if(snap.empty){showToast('Database kosong!','error');btn.innerHTML='MASUK';btn.disabled=false;return}
        var found=false;snap.forEach(function(doc){var d=doc.data();if(d.nip==u&&d.password==p){found=true;currentUser=Object.assign({id:doc.id},d)}});
        if(found)loginSuccess();else{showToast('NIP atau Password salah!','error');btn.innerHTML='MASUK';btn.disabled=false}
    }).catch(function(e){showToast('Gagal: '+e.message,'error');btn.innerHTML='MASUK';btn.disabled=false});
}

var editGuruId=null;
function openEditGuru(id){editGuruId=id;var g=allTeachersCache.find(function(x){return x.id===id});if(!g)return;var modalHtml='<div id="editGuruModal" class="modal-overlay active"><div class="modal-box"><div class="modal-header"><h3 class="font-bold text-white">Edit Guru</h3><button onclick="closeEditGuruModal()" class="text-muted hover:text-white"><i class="fas fa-times"></i></button></div><div class="modal-body" id="editGuruBody"></div><div class="modal-footer"><button onclick="closeEditGuruModal()" class="btn-secondary">Batal</button><button onclick="saveEditGuru()" class="btn-primary">Simpan</button></div></div></div>';if(!document.getElementById('editGuruModal')){document.body.insertAdjacentHTML('beforeend',modalHtml)}else{document.getElementById('editGuruModal').classList.add('active')}var body=document.getElementById('editGuruBody');body.innerHTML='<div class="space-y-4"><div><label class="text-xs text-muted block mb-1">Nama Guru</label><input type="text" id="editGuruNama" class="input-field" value="'+escAttr(g.namaGuru)+'"></div><div><label class="text-xs text-muted block mb-1">NIP</label><input type="text" id="editGuruNip" class="input-field" value="'+escAttr(g.nip)+'"></div><div><label class="text-xs text-muted block mb-1">Nama Sekolah</label><input type="text" id="editGuruSekolah" class="input-field" value="'+escAttr(g.namaSekolah||'')+'"></div><div><label class="text-xs text-muted block mb-1">NPSN</label><input type="text" id="editGuruNpsn" class="input-field" value="'+escAttr(g.npsn||'')+'"></div><div><label class="text-xs text-muted block mb-1">Password Baru (kosongkan jika tidak diubah)</label><input type="password" id="editGuruPass" class="input-field" placeholder="Password baru..."></div></div>'}

function calculateRoomAllocation(totalStudents){var rooms=[];var remaining=totalStudents;while(remaining>0){var count=Math.min(remaining,20);rooms.push({rows:5,cols:4,capacity:20,count:count});remaining-=count;}return rooms;}
function generateSpiralMap(rows,cols){var total=rows*cols;var map=new Array(total).fill(0);var directions=[[0,1],[1,0],[0,-1],[-1,0]];var dirIdx=0,r=0,c=0;for(var i=1;i<=total;i++){map[r*cols+c]=i;var nr=r+directions[dirIdx][0];var nc=c+directions[dirIdx][1];if(nr<0||nr>=rows||nc<0||nc>=cols||map[nr*cols+nc]!==0){dirIdx=(dirIdx+1)%4;nr=r+directions[dirIdx][0];nc=c+directions[dirIdx][1];}r=nr;c=nc;}return map;}

function renderToken(c){
    if(isFeatureLocked('token-paj')){c.innerHTML=lockedPageHtml('token-paj');return}

    c.innerHTML='<div class="fade-in card">'+scopeBarHtml()+'<h3 class="font-bold text-light mb-4 text-sm"><i class="fas fa-key mr-2 text-amber"></i>Generate Token Ujian PAJ</h3><p class="text-xs text-muted mb-4 bg-blue-500/10 border border-blue-500/30 p-3 rounded"><i class="fas fa-info-circle mr-1 text-blue-400"></i>Token yang di-generate akan otomatis terhubung dengan Bank Soal PAJ sesuai Kecamatan Anda.</p><div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 p-4 bg-dark/30 rounded border border-border"><div><label class="text-xs text-muted block mb-1">Mata Pelajaran</label><select id="tokenMapel" class="input-field">'+mapelOptionsHtml('',isSpecializedGuru())+'</select></div><div><label class="text-xs text-muted block mb-1">Kelas</label><select id="tokenKelas" class="input-field">'+kelasOptionsHtml(currentUser.kelas)+'</select></div><div><label class="text-xs text-muted block mb-1">Rombel</label><select id="tokenRombel" class="input-field">'+rombelOptionsHtml(currentUser.rombel)+'</select></div><div><label class="text-xs text-muted block mb-1">Durasi Ujian (Menit)</label><input type="number" id="tokenDurasi" class="input-field" value="60" min="5" max="300"></div></div><div class="flex flex-wrap gap-3 mb-6"><button onclick="generateToken()" class="btn-primary"><i class="fas fa-plus mr-2"></i>Generate 1 Token Baru</button><button onclick="bulkDeleteTokens()" class="btn-secondary border-pajRed/50 text-pajRed hover:bg-pajRed/10"><i class="fas fa-trash mr-2"></i>Hapus Semua Token Aktif</button></div><div class="mb-4"><h4 class="font-bold text-light text-sm mb-3"><i class="fas fa-list mr-2 text-muted"></i>Daftar Token Aktif</h4><div id="tokenListContainer" class="space-y-3 max-h-[50vh] overflow-y-auto pr-2"></div></div></div>';c.dataset.rendered='token-paj';renderTokenList();
}
function generateRandomToken(length){var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';var token='';for(var i=0;i<length;i++){token+=chars.charAt(Math.floor(Math.random()*chars.length));}return token;}
function generateToken(){var mapel=document.getElementById('tokenMapel').value;var kelas=document.getElementById('tokenKelas').value;var rombel=document.getElementById('tokenRombel').value;var durasi=parseInt(document.getElementById('tokenDurasi').value)||60;if(!mapel||!kelas||!rombel){showToast('Pilih Mapel, Kelas, dan Rombel terlebih dahulu!','error');return;}if(durasi<5||durasi>300){showToast('Durasi ujian minimal 5 menit dan maksimal 300 menit!','error');return;}var myPAJQ=getMyQuestions().filter(function(q){return q.mapel===mapel&&q.kelas===kelas;});if(myPAJQ.length===0){showToast('Tidak ada soal PAJ untuk '+getMapelName(mapel)+' '+kelas+' di Database!','error');return;}var tokenCode=generateRandomToken(6);var btnGenerate=event.target.closest('button');btnGenerate.disabled=true;btnGenerate.innerHTML='<span class="loading-spinner mr-2"></span>Membuat Token...';var tokenData={token:tokenCode,mapel:mapel,kelas:kelas,rombel:rombel,npsn:currentUser.npsn,kecamatanId:currentUser.kecamatanId,createdBy:currentUser.namaGuru,totalSoal:myPAJQ.length,durasi:durasi,isActive:true,createdAt:firebase.firestore.FieldValue.serverTimestamp()};dbSAT.collection('exam_tokens').add(tokenData).then(function(){showToast('Token <b>'+tokenCode+'</b> berhasil dibuat! Durasi: '+durasi+' menit.','success');btnGenerate.disabled=false;btnGenerate.innerHTML='<i class="fas fa-plus mr-2"></i>Generate 1 Token Baru';renderTokenList();}).catch(function(e){showToast('Gagal membuat token: '+e.message,'error');btnGenerate.disabled=false;btnGenerate.innerHTML='<i class="fas fa-plus mr-2"></i>Generate 1 Token Baru';});}
function renderTokenList(){var container=document.getElementById('tokenListContainer');if(!container)return;var myTokens=getMyTokens().filter(function(t){return t.isActive===true;});if(!myTokens.length){container.innerHTML='<div class="text-center py-10 text-muted"><i class="fas fa-key text-3xl opacity-30 mb-3 block"></i>Belum ada token aktif.</div>';return;}container.innerHTML=myTokens.map(function(t){var jam=Math.floor(t.durasi/60);var menit=t.durasi%60;var durasiText=jam>0?jam+' Jam '+menit+' Menit':menit+' Menit';return'<div class="p-4 bg-dark/30 rounded border border-amber/30 flex flex-col md:flex-row justify-between items-start md:items-center gap-3"><div><div class="flex items-center gap-3 mb-1 flex-wrap"><span class="font-mono text-2xl font-bold text-amber tracking-widest bg-black/30 px-4 py-1 rounded border border-amber/50">'+t.token+'</span><span class="badge badge-blue">'+getMapelName(t.mapel)+'</span><span class="badge badge-red">'+t.kelas+' - Rombel '+t.rombel+'</span><span class="badge bg-green-500/15 text-green-400 border border-green-500/30"><i class="fas fa-clock mr-1"></i>'+durasiText+'</span></div><div class="text-xs text-muted ml-1">NPSN: '+t.npsn+' | Soal: <span class="text-light font-bold">'+t.totalSoal+'</span> | Dibuat: '+((t.createdAt&&t.createdAt.toDate)?t.createdAt.toDate().toLocaleString('id-ID'):'-')+'</div></div><div class="flex gap-2"><button onclick="copyToken(\''+t.token+'\')" class="btn-secondary text-xs py-2 px-3 border-blue-500/50 text-blue-400 hover:bg-blue-500/10"><i class="fas fa-copy mr-1"></i>Salin</button><button onclick="deleteToken(\''+t.id+'\',\''+t.token+'\')" class="btn-secondary text-xs py-2 px-3 border-pajRed/50 text-pajRed hover:bg-pajRed/10"><i class="fas fa-ban mr-1"></i>Nonaktifkan</button></div></div>';}).join('');}
function copyToken(token){navigator.clipboard.writeText(token).then(function(){showToast('Token '+token+' berhasil disalin!','success');}).catch(function(){var ta=document.createElement("textarea");ta.value=token;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Token '+token+' berhasil disalin!','success');});}
function deleteToken(id,token){if(!confirm('Nonaktifkan token "'+token+'"?'))return;dbSAT.collection('exam_tokens').doc(id).update({isActive:false}).then(function(){showToast('Token '+token+' dinonaktifkan.','success');}).catch(function(e){showToast('Gagal: '+e.message,'error');});}
function bulkDeleteTokens(){var myTokens=getMyTokens().filter(function(t){return t.isActive===true;});if(!myTokens.length){showToast('Tidak ada token aktif.','error');return;}if(!confirm('NONAKTIFKAN SEMUA ('+myTokens.length+') token ujian PAJ?'))return;var batch=dbSAT.batch();myTokens.forEach(function(t){batch.update(dbSAT.collection('exam_tokens').doc(t.id),{isActive:false});});batch.commit().then(function(){showToast('Semua token berhasil dinonaktifkan.','success');}).catch(function(e){showToast('Gagal: '+e.message,'error');});}

/* ==================== KOREKSI & NILAI PAJ (REALTIME, TAMPILAN PENUH, KUNCI PG & URAIAN, FILTER ROMBEL RUANG PAI/PJOK) ==================== */
var currentKoreksiId = null;

function renderKoreksi(c){
    if(isFeatureLocked('koreksi-paj')){c.innerHTML=lockedPageHtml('koreksi-paj');return}
    if(c.dataset.rendered==='koreksi-paj'){renderKoreksiList();return}
    
    // Cek apakah guru PAI/PJOK untuk menampilkan filter Rombel & Ruang
    var isSpecial = isSpecializedGuru(); 
    var filterHtml = '<div class="flex flex-wrap gap-4 mb-4">';
    filterHtml += '<select id="koreksiMapel" class="input-field w-48" onchange="renderKoreksiList()">'+mapelOptionsHtml('',isSpecial)+'</select>';
    filterHtml += '<select id="koreksiKelas" class="input-field w-36" onchange="renderKoreksiList()">'+kelasOptionsHtml(currentUser.kelas)+'</select>';
    
    if(isSpecial){
        filterHtml += '<select id="koreksiRombel" class="input-field w-36" onchange="renderKoreksiList()"><option value="">Semua Rombel</option><option value="A">Rombel A</option><option value="B">Rombel B</option><option value="C">Rombel C</option></select>';
        filterHtml += '<select id="koreksiRuang" class="input-field w-36" onchange="renderKoreksiList()">'+ruangOptionsHtml('')+'</select>';
    }
    
    filterHtml += '<button onclick="printNilaiAkhir()" class="btn-primary bg-gradient-to-r from-green-600 to-green-700 border-0 text-white"><i class="fas fa-print mr-2"></i>Cetak Nilai</button>';
    filterHtml += '</div>';
    
    c.innerHTML='<div class="fade-in card">'+scopeBarHtml()+
    '<h3 class="font-bold text-light mb-4 text-sm"><i class="fas fa-check-double mr-2 text-pajRed"></i>Koreksi & Nilai PAJ (Realtime)</h3>'+
    '<p class="text-xs text-muted mb-4 bg-green-500/10 border border-green-500/30 p-3 rounded"><i class="fas fa-database mr-1 text-green-400"></i>Klik tombol <b>"Lihat & Koreksi"</b> untuk melihat soal, kunci jawaban PG, jawaban uraian siswa, dan menginput nilai uraian manual. <b>Soal PG selalu di atas, Uraian di bawah.</b></p>'+
    filterHtml +
    '<div id="koreksiListContainer"></div>'+
    '<div id="koreksiModalOverlay" class="modal-overlay"><div class="modal-box"><div class="modal-header"><h3 class="font-bold text-white"><i class="fas fa-file-alt mr-2 text-amber"></i>Detail Jawaban & Koreksi Uraian</h3><button onclick="closeKoreksiModal()" class="text-muted hover:text-white text-xl"><i class="fas fa-times"></i></button></div><div class="modal-body" id="koreksiModalContent"></div><div class="modal-footer bg-dark/50"><div class="flex-1 text-left"><span class="text-muted text-xs">Nilai PG Otomatis: <span id="footerPG" class="text-light font-bold">0</span> | Nilai Uraian Input: <span id="footerUraian" class="text-amber font-bold">0</span> | <span class="text-pajRed font-bold">AKHIR: <span id="footerAkhir">0</span></span></span></div><button onclick="simpanKoreksiNilai()" class="btn-primary px-8"><i class="fas fa-save mr-2"></i>Simpan & Finalisasi Nilai</button></div></div></div></div>';
    
    c.dataset.rendered='koreksi-paj'; 
    renderKoreksiList();
}

function renderKoreksiList(){
    var container=document.getElementById('koreksiListContainer');if(!container)return;
    var mapel=document.getElementById('koreksiMapel').value,
        kelas=document.getElementById('koreksiKelas').value,
        rombelFilter = document.getElementById('koreksiRombel') ? document.getElementById('koreksiRombel').value : '',
        ruangFilter = document.getElementById('koreksiRuang') ? document.getElementById('koreksiRuang').value : '';
        
    var myRes=getMyResults().filter(function(r){return r.isPAJ===true||r.source==='paj'}); 
    
    if(mapel) myRes=myRes.filter(function(r){return r.mapel===mapel}); 
    if(kelas) myRes=myRes.filter(function(r){return r.kelas===kelas});
    
    // Filter tambahan untuk PAI / PJOK berdasarkan data siswa
    if(rombelFilter || ruangFilter){
        myRes = myRes.filter(function(r){
            var s = students.find(function(st){return st.id===r.studentId||st.id===r.userId||st.nisn===r.studentNisn||st.nisn===r.nisn});
            if(!s) return false;
            var matchRombel = rombelFilter ? s.rombel === rombelFilter : true;
            var matchRuang = ruangFilter ? s.ruang === ruangFilter : true;
            return matchRombel && matchRuang;
        });
    }

    if(!myRes.length){container.innerHTML='<div class="text-center py-10 text-muted"><i class="fas fa-check-double text-3xl opacity-30 mb-3 block"></i>Belum ada hasil ujian masuk untuk filter ini.</div>';return;}
    
    myRes.sort(function(a,b){var vA=a.nilaiAkhir||a.score||0;var vB=b.nilaiAkhir||b.score||0;return vB-vA;});
    
    container.innerHTML='<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-dark/50 text-muted text-xs uppercase"><tr><th class="p-3 text-left">Nama Siswa</th><th class="p-3 text-center">No. Peserta</th><th class="p-3 text-center">Mapel</th>'+(isSpecializedGuru()?'<th class="p-3 text-center">Rombel</th><th class="p-3 text-center">Ruang</th>':'')+'<th class="p-3 text-center">Nilai PG</th><th class="p-3 text-center">Nilai Uraian</th><th class="p-3 text-center text-pajRed font-bold">Nilai Akhir</th><th class="p-3 text-center">Aksi</th></tr></thead><tbody>'+myRes.map(function(r){
        var s=students.find(function(st){return st.id===r.studentId||st.id===r.userId||st.nisn===r.studentNisn||st.nisn===r.nisn});
        var nama=s?s.nama:(r.namaSiswa||r.studentName||r.name||'-');
        var pg=r.nilaiPG||r.scorePG||r.pgScore||r.pg||0;
        var ur=r.nilaiUraian||r.scoreUraian||r.essayScore||0;
        var ak=r.nilaiAkhir||r.score||r.finalScore||0;
        var isKoreksi=r.dikoreksi===true;
        
        var rombelCell = isSpecializedGuru() ? '<td class="p-3 text-center text-xs">'+(s?s.rombel:'-')+'</td><td class="p-3 text-center text-xs">'+(s?s.ruang:'-')+'</td>' : '';
        
        return'<tr class="border-b border-border hover:bg-dark/30"><td class="p-3 font-medium text-light">'+escHtml(nama)+'</td><td class="p-3 text-center font-mono text-xs">'+escHtml(r.pesertaUjian||r.studentNisn||'-')+'</td><td class="p-3 text-center"><span class="badge badge-blue text-xs">'+getMapelName(r.mapel)+'</span></td>'+rombelCell+'<td class="p-3 text-center font-bold">'+Math.round(pg)+'</td><td class="p-3 text-center font-bold '+(isKoreksi?'text-success':'text-amber')+'">'+Math.round(ur)+'</td><td class="p-3 text-center font-bold text-xl text-pajRed">'+Math.round(ak)+'</td><td class="p-3 text-center whitespace-nowrap"><button onclick="openKoreksiModal(\''+escAttr(r.id)+'\')" class="btn-primary text-xs py-2 px-3 mr-1"><i class="fas fa-eye mr-1"></i>Lihat & Koreksi</button><button onclick="hapusHasilUjian(\''+escAttr(r.id)+'\', this)" data-nama="'+escAttr(nama)+'" class="btn-secondary text-xs py-2 px-3 border-pajRed/50 text-pajRed hover:bg-pajRed/10"><i class="fas fa-trash mr-1"></i>Hapus</button></td></tr>';
    }).join('')+'</tbody></table></div>';
}

function hapusHasilUjian(id, btnElement){
    var nama = btnElement ? btnElement.getAttribute('data-nama') : 'Siswa';
    if(!confirm('HAPUS hasil ujian milik "'+nama+'"? Data yang dihapus tidak bisa dikembalikan.'))return;
    dbPAJ.collection('exam_results').doc(id).delete().then(function(){
        showToast('Hasil ujian berhasil dihapus!','success');
        renderKoreksiList(); // Refresh tabel setelah hapus
    }).catch(function(e){
        showToast('Gagal menghapus: '+e.message,'error');
    });
}

function openKoreksiModal(resId){
    currentKoreksiId = resId; 
    var r = results.find(function(x){return x.id === resId;}); 
    if(!r){showToast('Data hasil tidak ditemukan!','error'); return;}
    
    var s = students.find(function(st){return st.id===r.studentId||st.id===r.userId||st.nisn===r.studentNisn||st.nisn===r.nisn}); 
    var nama = s?s.nama:(r.namaSiswa||r.studentName||r.name||'-');
    
    var examQuestions = getMyQuestions().filter(function(q){return q.mapel === r.mapel && q.kelas === r.kelas;}); 
    var answers = r.answers || {}; 
    var valPG = r.nilaiPG||r.scorePG||r.pgScore||r.pg||0; 
    var existingUraianScores = r.uraianScores || {};
    
    var sortedQuestions = examQuestions.sort(function(a, b) {
        var isApg = (a.type === 'pg' || a.type === 'urutan');
        var isBpg = (b.type === 'pg' || b.type === 'urutan');
        if (isApg && !isBpg) return -1;
        if (!isApg && isBpg) return 1;
        return 0;
    });

    var body = document.getElementById('koreksiModalContent'); 
    var h = '<div class="bg-blue-500/10 border border-blue-500/30 p-4 rounded mb-6"><h4 class="text-light font-bold text-lg"><i class="fas fa-user mr-2 text-blue-400"></i>'+escHtml(nama)+'</h4><div class="text-sm text-muted mt-1">Mapel: '+getMapelName(r.mapel)+' | No. Peserta: '+(r.pesertaUjian||'-')+' | Nilai PG Otomatis: <b class="text-light">'+Math.round(valPG)+'</b></div></div>';
    
    h += '<h5 class="text-light font-bold mb-3 border-b border-border pb-2 text-base"><i class="fas fa-list-ol mr-2 text-pajRed"></i>Daftar Soal, Kunci, dan Jawaban Siswa</h5>';
    
    if(!sortedQuestions.length){ 
        h += '<div class="text-center text-pajRed py-4">Soal tidak ditemukan di Bank Soal untuk mapel/kelas ini.</div>'; 
    } else {
        var pgNum = 1;
        var urNum = 1;
        var isPgSection = true;
        var isUrSection = true;

        sortedQuestions.forEach(function(q){
            var ansVal = answers[q.id] || '-'; 
            var isPG = (q.type === 'pg' || q.type === 'urutan'); 
            var kunci = (q.correctKey || q.answer || '-').toUpperCase();
            var kunciUraianText = q.essayKey || q.essayAnswer || q.pedoman || q.correctKey || q.answer || '';

            if(isPG && isPgSection){
                h += '<div class="bg-pajRed/10 border-l-4 border-pajRed p-3 rounded mb-4 mt-2"><h4 class="text-pajRed font-bold text-sm"><i class="fas fa-list mr-2"></i>BAGIAN PILIHAN GANDA / MENJODOHKAN</h4></div>';
                isPgSection = false;
            }
            if(!isPG && isUrSection){
                h += '<div class="bg-blue-500/10 border-l-4 border-blue-500 p-3 rounded mb-4 mt-6"><h4 class="text-blue-400 font-bold text-sm"><i class="fas fa-pen-fancy mr-2"></i>BAGIAN URAIAN</h4></div>';
                isUrSection = false;
            }

            var nomorSoal = isPG ? pgNum : urNum;

            h += '<div class="mb-8 p-5 bg-dark/40 rounded-lg border border-border">';
            h += '<div class="flex items-center gap-2 mb-3"><span class="bg-pajRed text-white text-sm px-3 py-1 rounded font-bold">Soal '+nomorSoal+'</span><span class="badge '+(isPG?'badge-red':'badge-blue')+' text-xs">'+(isPG?'Pilihan Ganda':'Uraian')+'</span></div>';
            h += '<p class="text-base text-light leading-relaxed mb-4">'+(q.text||'')+'</p>'; 
            
            if(q.image) h += '<img src="'+q.image+'" class="mb-4 rounded max-h-32 border border-border">';
            
            if(isPG){
                h += '<div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">'; 
                var opts = [q.optA, q.optB, q.optC, q.optD]; 
                var letters = getOptLetters();
                letters.forEach(function(L, oi){ 
                    var opt = opts[oi];
                    if(!opt && opt !== '') return; 
                    var isKunci = L === kunci; 
                    var isPicked = String(ansVal).toUpperCase() === L; 
                    
                    var rowCls = 'p-3 rounded border flex items-center gap-3 text-sm ';
                    if(isPicked && isKunci) rowCls += 'bg-green-500/20 border-green-500 text-green-300 font-bold';
                    else if(isPicked && !isKunci) rowCls += 'bg-red-500/20 border-red-500 text-red-300 font-bold';
                    else if(isKunci) rowCls += 'bg-blue-500/10 border-blue-500/50 text-blue-300 font-bold';
                    else rowCls += 'bg-dark/30 border-border text-muted';
                    
                    var iconKunci = isKunci ? '<i class="fas fa-key text-[10px] text-yellow-400"></i>' : ''; 
                    var iconPicked = isPicked ? '<i class="fas fa-user text-[10px] ml-auto"></i>' : '';
                    
                    h += '<div class="'+rowCls+'"><span class="font-bold text-base w-6 text-center">'+L+'.</span><span class="flex-1">'+escHtml(stripHtml(opt))+'</span>'+iconKunci+iconPicked+'</div>'; 
                }); 
                
                var pickedStatusClass = (String(ansVal).toUpperCase() === kunci) ? 'text-green-400' : 'text-red-400';
                h += '<div class="mt-4 bg-black/20 p-3 rounded border border-border flex items-center gap-4">';
                h += '<span class="text-sm text-muted">Jawaban Siswa: <b class="'+pickedStatusClass+'">'+String(ansVal).toUpperCase()+'</b></span>';
                h += '<span class="text-sm text-muted">|</span>';
                h += '<span class="text-sm text-muted">Kunci Jawaban: <b class="text-blue-400">'+kunci+'</b></span>';
                h += '</div>';

                h += '</div>'; 
                pgNum++;
            } else {
                h += '<div class="bg-black/30 border border-border rounded p-4 mb-4"><div class="text-xs text-muted uppercase font-bold mb-2">Jawaban Siswa:</div><p class="text-base text-gray-200 whitespace-pre-wrap">'+(ansVal==='-' ? '<span class="italic text-muted">Tidak dijawab</span>' : escHtml(ansVal))+'</p></div>';
                
                // Tampilan Kunci / Pedoman Jawaban Uraian
                if(kunciUraianText && kunciUraianText !== '-'){
                    h += '<div class="bg-blue-500/10 border border-blue-500/30 rounded p-4 mb-4"><div class="text-xs text-blue-400 uppercase font-bold mb-2"><i class="fas fa-key mr-1"></i>Kunci / Pedoman Jawaban:</div><p class="text-sm text-light whitespace-pre-wrap">'+escHtml(kunciUraianText)+'</p></div>';
                }

                var defVal = existingUraianScores[q.id] !== undefined ? existingUraianScores[q.id] : '';
                h += '<div class="flex items-center gap-4 bg-amber/5 border border-amber/30 rounded p-3"><label class="text-sm text-amber font-bold whitespace-nowrap">Nilai Uraian (0-100):</label><input type="number" class="input-field w-32 text-center border-amber focus:border-amber text-lg font-bold" id="urVal-'+q.id+'" value="'+defVal+'" min="0" max="100" placeholder="0" oninput="hitungSementaraAkhir()"></div>';
                urNum++;
            } 
            h += '</div>'; 
        }); 
    } 
    
    body.innerHTML = h; 
    document.getElementById('koreksiModalOverlay').classList.add('active'); 
    hitungSementaraAkhir();
}

function hitungSementaraAkhir(){
    var r = results.find(function(x){return x.id === currentKoreksiId;}); if(!r) return;
    var examQuestions = getMyQuestions().filter(function(q){return q.mapel === r.mapel && q.kelas === r.kelas && q.type === 'uraian';}); var pg = r.nilaiPG||r.scorePG||r.pgScore||r.pg||0;
    var totalUraian = 0; var countUraian = 0;
    examQuestions.forEach(function(q){ var inp = document.getElementById('urVal-'+q.id); if(inp && inp.value !== ''){ totalUraian += parseFloat(inp.value) || 0; countUraian++; } });
    var avgUraian = countUraian > 0 ? Math.round(totalUraian / countUraian) : 0; var akhir = Math.round((pg * 0.7) + (avgUraian * 0.3));
    var fPG = document.getElementById('footerPG'); var fUr = document.getElementById('footerUraian'); var fAk = document.getElementById('footerAkhir');
    if(fPG) fPG.innerText = Math.round(pg); if(fUr) fUr.innerText = avgUraian; if(fAk) fAk.innerText = akhir;
}

function closeKoreksiModal(){ 
    document.getElementById('koreksiModalOverlay').classList.remove('active'); currentKoreksiId = null; 
}

function simpanKoreksiNilai(){
    if(!currentKoreksiId) return; 
    var r = results.find(function(x){return x.id === currentKoreksiId;}); 
    if(!r){showToast('Data tidak ditemukan','error'); return;}
    
    var examQuestions = getMyQuestions().filter(function(q){return q.mapel === r.mapel && q.kelas === r.kelas && q.type === 'uraian';}); 
    var pg = r.nilaiPG||r.scorePG||r.pgScore||r.pg||0;
    var uraianScoresObj = {}; 
    var totalUraian = 0; 
    var countUraian = 0;
    
    examQuestions.forEach(function(q){ 
        var inp = document.getElementById('urVal-'+q.id); 
        var val = (inp && inp.value !== '') ? (parseFloat(inp.value) || 0) : 0; 
        if(val < 0) val = 0; 
        if(val > 100) val = 100; 
        uraianScoresObj[q.id] = val; 
        totalUraian += val; 
        countUraian++; 
    });
    
    var avgUraian = countUraian > 0 ? Math.round(totalUraian / countUraian) : 0; 
    var nilaiAkhir = Math.round((pg * 0.7) + (avgUraian * 0.3));
    
    var updateData = { 
        nilaiPG: Math.round(pg), 
        scorePG: Math.round(pg), 
        nilaiUraian: avgUraian, 
        scoreUraian: avgUraian, 
        essayScore: avgUraian, 
        nilaiAkhir: nilaiAkhir, 
        score: nilaiAkhir, 
        finalScore: nilaiAkhir, 
        totalScore: nilaiAkhir, 
        uraianScores: uraianScoresObj, 
        dikoreksi: true 
    };

    dbPAJ.collection('exam_results').doc(currentKoreksiId).update(updateData).then(function(){ 
        showToast('Nilai berhasil disimpan & difinalisasi! Akhir: '+nilaiAkhir, 'success'); 
        
        // Update data memori lokal secara langsung
        Object.assign(r, updateData);
        
        // Refresh tabel list di belakang modal agar nilai terbaru langsung tampil
        renderKoreksiList();
        
        // Baru tutup modal setelah tabel di-refresh
        closeKoreksiModal(); 

    }).catch(function(e){ 
        showToast('Gagal menyimpan: '+e.message, 'error'); 
    });
}

    if(kelas) myRes=myRes.filter(function(r){return r.kelas===kelas});
    
    if(rombelFilter || ruangFilter){
        myRes = myRes.filter(function(r){

            var matchRombel = rombelFilter ? s.rombel === rombelFilter : true;

    doc.write('<!DOCTYPE html><html><head><title>Cetak Nilai PAJ</title>'+style+'</head><body><h2 style="text-align:center;margin-bottom:0">LAPORAN NILAI PENILAIAN AKHIR JENJANG (PAJ)</h2><p style="text-align:center;margin-top:5px;margin-bottom:2px"><b>'+escHtml(currentUser.namaSekolah)+'</b></p><p style="text-align:center;margin-bottom:2px">Kec. '+escHtml(getKecNama(currentUser.kecamatanId))+' | NPSN: '+currentUser.npsn+'</p><p style="text-align:center;margin-bottom:15px">'+subTitleFilter+'</p><table><thead><tr><th>No</th><th style="text-align:left">Nama Siswa</th><th>No. Peserta</th><th>Nilai PG (70%)</th><th>Nilai Uraian (30%)</th><th>Nilai Akhir</th></tr></thead><tbody>');
    myRes.sort(function(a,b){ var vA=a.nilaiAkhir||a.score||0; var vB=b.nilaiAkhir||b.score||0; return vB - vA; });
    myRes.forEach(function(r, i){ var s=students.find(function(st){return st.id===r.studentId||st.id===r.userId||st.nisn===r.studentNisn||st.nisn===r.nisn}); var nama=s?s.nama:(r.namaSiswa||r.studentName||r.name||'-'); doc.write('<tr><td>'+(i+1)+'</td><td style="text-align:left">'+escHtml(nama)+'</td><td>'+(r.pesertaUjian||'-')+'</td><td>'+Math.round(r.nilaiPG||r.scorePG||0)+'</td><td>'+Math.round(r.nilaiUraian||r.scoreUraian||0)+'</td><td><b>'+Math.round(r.nilaiAkhir||r.score||0)+'</b></td></tr>'); });
    doc.write('</tbody></table><div style="display:flex;justify-content:space-between;margin-top:40px;font-size:11pt"><div style="text-align:center;width:45%"><p>Mengetahui,</p><p>Kepala Sekolah</p><br><br><br><p style="font-weight:bold;text-decoration:underline">(............................................)</p><p>NIP. .....................................</p></div><div style="text-align:center;width:45%"><p>Majalengka, ................................</p><p>Guru Mata Pelajaran</p><br><br><br><p style="font-weight:bold;text-decoration:underline">(............................................)</p><p>NIP. .....................................</p></div></div></body></html>'); doc.close();
    setTimeout(function(){ iframe.contentWindow.focus(); iframe.contentWindow.print(); setTimeout(function(){ try{document.body.removeChild(iframe)}catch(e){} }, 3000); }, 500);
}
/* ==================== CETAK NASKAH ==================== */
function buildKopHtml(kecNama){return '<div class="kop-area"><img src="'+KOP_LOGO_URL+'" class="kop-logo" alt="Logo"><div class="kop-text"><h1>PEMERINTAH KABUPATEN MAJALENGKA</h1><h2>DINAS PENDIDIKAN</h2><h3>DAAI SCORE - KOREK API</h3></div></div><div class="kop-sub">Penilaian Akhir Jenjang (PAJ) Tahun Pelajaran 2025/2026</div>';}
function buildPetunjukHtml(hasPg,hasUr){var h='<div class="petunjuk"><p><b>Petunjuk Umum:</b></p><ol>';if(hasPg)h+='<li>Pilihan Ganda: Pilihlah satu jawaban paling tepat.</li>';if(hasUr)h+='<li>Uraian: Jawablah dengan jelas dan tepat.</li>';h+='</ol></div>';return h;}

function renderPrint(c){if(isFeatureLocked('print-paj')){c.innerHTML=lockedPageHtml('print-paj');return}c.innerHTML='<div class="fade-in card">'+scopeBarHtml()+'<h3 class="font-bold text-light mb-4 text-sm"><i class="fas fa-print mr-2 text-muted"></i>Cetak Soal PAJ <span class="text-blue-400 text-xs">(Format KOP)</span></h3><div class="flex flex-wrap gap-4 mb-4"><select id="printMapel" class="input-field w-48" onchange="renderPrintPreview()">'+mapelOptionsHtml('',isSpecializedGuru())+'</select><select id="printKelas" class="input-field w-48" onchange="renderPrintPreview()">'+kelasOptionsHtml(currentUser.kelas)+'</select><button onclick="doPrintSoal()" class="btn-primary"><i class="fas fa-print mr-2"></i>Cetak Naskah</button></div><div id="printPreviewContainer" class="bg-gray-400 p-4 md:p-8 rounded-lg overflow-x-auto"></div></div>';setTimeout(renderPrintPreview,100)}

function renderPrintPreview(){var m=document.getElementById('printMapel'),c=document.getElementById('printPreviewContainer');if(!m)return;var mv=m.value;if(!mv){c.innerHTML='<p class="text-center text-muted py-20 bg-white rounded">Pilih mapel</p>';return}var data=getMyQuestions().filter(function(q){return q.mapel===mv});var pg=data.filter(function(q){return q.type==='pg';}),ur=data.filter(function(q){return q.type==='uraian';}),urt=data.filter(function(q){return q.type==='urutan';});var kecNama=getKecNama(currentUser.kecamatanId);var h='<div class="print-preview-sheet bg-white text-black shadow-2xl rounded-lg mx-auto" style="width:210mm;min-height:297mm;padding:2cm">';h+=buildKopHtml(kecNama);h+=buildPetunjukHtml(pg.length>0||urt.length>0,ur.length>0);var num=1;if(pg.length||urt.length){h+='<div class="section-title">I. Pilihan Ganda / Menjodohkan</div>';pg.forEach(function(q){var qText=processSpecialLang(q.text||'',mv);h+='<div class="soal-block"><div style="margin-bottom:4px"><b>'+(num++)+'.</b> '+qText+'</div>';if(q.image)h+='<img src="'+q.image+'" class="soal-img">';getOptLetters().forEach(function(L){var optTxt=q['opt'+L]||'';if(optTxt){optTxt=processSpecialLang(optTxt,mv);h+='<div style="margin-left:20px;margin-bottom:2px">'+L+'. '+optTxt+'</div>'}});h+='</div>'});urt.forEach(function(q){var qText=processSpecialLang(q.text||'',mv);h+='<div class="soal-block"><div style="margin-bottom:4px"><b>'+(num++)+'.</b> '+qText+'</div>';if(q.image)h+='<img src="'+q.image+'" class="soal-img">';if(q.statements&&q.statements.length>0){h+='<div style="margin-left:20px;margin-top:8px;">';q.statements.forEach(function(stmt,idx){h+='<div class="urut-row"><div class="urut-num-box">'+(idx+1)+'</div><div class="urut-text">'+processSpecialLang(stmt,mv)+'</div></div>'});h+='</div>'}h+='</div>'})}if(ur.length){h+='<div class="section-title" style="margin-top:16px">II. Uraian</div>';ur.forEach(function(q){var qText=processSpecialLang(q.text||'',mv);h+='<div class="soal-block"><div style="margin-bottom:4px"><b>'+(num++)+'.</b> '+qText+'</div>';if(q.image)h+='<img src="'+q.image+'" class="soal-img">';h+='</div>'})}h+='</div>';c.innerHTML=h}

function doPrintSoal(){var s=document.querySelector('.print-preview-sheet');if(!s){showToast('Tidak ada preview','error');return;}var f=document.createElement('iframe');f.style.cssText='position:fixed;left:-9999px;top:0;width:210mm;height:297mm';document.body.appendChild(f);var d=f.contentDocument||f.contentWindow.document;d.open();d.write('<!DOCTYPE html><html><head><style>'+PRINT_CSS+'</style></head><body>');d.write(s.innerHTML);d.write('</body></html>');d.close();setTimeout(function(){f.contentWindow.focus();f.contentWindow.print();setTimeout(function(){document.body.removeChild(f);},3000);},500);}

/* ==================== KUNCI JAWABAN ==================== */
function renderKunciJawaban(c){if(isFeatureLocked('kunci-paj')){c.innerHTML=lockedPageHtml('kunci-paj');return}c.innerHTML='<div class="fade-in card">'+scopeBarHtml()+'<h3 class="font-bold text-light mb-4 text-sm"><i class="fas fa-key mr-2 text-blue-400"></i>Kunci Jawaban PAJ <span class="text-blue-400 text-xs">(DB PAJ)</span></h3><div class="flex flex-wrap gap-4 mb-4"><select id="kunciMapel" class="input-field w-48" onchange="renderKunciList()">'+mapelOptionsHtml('',isSpecializedGuru())+'</select><select id="kunciKelas" class="input-field w-48" onchange="renderKunciList()">'+kelasOptionsHtml(currentUser.kelas)+'</select><button onclick="printDocFromView(\'kunciViewArea\')" class="btn-primary"><i class="fas fa-print mr-2"></i>Cetak</button></div><div id="kunciListContainer"></div></div>';renderKunciList()}
function renderKunciList(){var container=document.getElementById('kunciListContainer');if(!container)return;var mapel=document.getElementById('kunciMapel').value,kelas=document.getElementById('kunciKelas').value;var allQ=getMyQuestions();if(mapel)allQ=allQ.filter(function(q){return q.mapel===mapel});if(kelas)allQ=allQ.filter(function(q){return q.kelas===kelas});if(!allQ.length){container.innerHTML='<div class="text-center py-10 text-muted">Tidak ada soal.</div>';return}var h='<div id="kunciViewArea" class="doc-print-area shadow-2xl rounded-lg overflow-x-auto mt-4"><h2>Kunci Jawaban PAJ - '+getMapelName(mapel)+'</h2><table><thead><tr><th style="width:30px;">No</th><th style="width:100px;">Tipe</th><th>Kunci Jawaban</th><th style="width:60px;">Skor</th></tr></thead><tbody>';allQ.forEach(function(q,i){var bentuk=q.type==='pg'?'PG':q.type==='urutan'?'Urutan':'Uraian';h+='<tr><td style="text-align:center;">'+(i+1)+'</td><td style="text-align:center;">'+bentuk+'</td><td style="text-align:center;font-weight:bold;">'+escHtml((q.answer||q.correctKey||'-').toUpperCase())+'</td><td style="text-align:center;">'+(q.score||1)+'</td></tr>'});h+='</tbody></table></div>';container.innerHTML=h}

/* CETAK UNIVERSAL */
function printDocFromView(elementId){var s=document.getElementById(elementId);if(!s){showToast('Dokumen tidak ditemukan','error');return;}var f=document.createElement('iframe');f.style.cssText='position:fixed;left:-9999px;top:0;width:210mm;height:297mm';document.body.appendChild(f);var d=f.contentDocument||f.contentWindow.document;d.open();d.write('<!DOCTYPE html><html><head><style>body{font-family:"Times New Roman",serif;font-size:11pt;line-height:1.4;color:#000;background:#fff;margin:0;padding:2cm;}h2{text-align:center;margin-bottom:12px;font-size:14pt;}table{width:100%;border-collapse:collapse;margin-bottom:20px;}th,td{border:1px solid #000;padding:6px 8px;vertical-align:top;}th{background:#f0f0f0;text-align:center;font-weight:bold;}@media print{@page{margin:2cm}}</style></head><body>');d.write(s.innerHTML);d.write('</body></html>');d.close();setTimeout(function(){f.contentWindow.focus();f.contentWindow.print();setTimeout(function(){document.body.removeChild(f);},3000);},500);}

/* ==================== INISIALISASI & REALTIME LISTENER ==================== */
function initApp(){
    // 1. Kecamatan (Tetap onSnapshot karena datanya sedikit)
    dbSAT.collection('kecamatan').onSnapshot(function(snap){
        kecamatanList=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
        populateRegKecDropdown();
    });

    // 2. Teachers (Diubah ke GET agar tidak download semua guru terus menerus)
    dbSAT.collection('teachers').get().then(function(snap){
        allTeachersCache=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
        var uniqueSchools={};
        allTeachersCache.forEach(function(t){
            if(t.npsn&&t.namaSekolah&&!uniqueSchools[t.npsn]){
                uniqueSchools[t.npsn]={npsn:t.npsn,sekolah:t.namaSekolah,kec:t.kecamatanId};
            }
        });
        allSchoolsList=Object.values(uniqueSchools);
        var ap=document.querySelector('.nav-item.active');
        if(ap){var pg=ap.dataset.page;if(pg==='admin-guru')renderGuruTable();if(pg==='pengawas-paj')renderPengawasList();}
    }).catch(function(e){ console.error("Gagal memuat guru:", e); });
    
    if(currentUser&&currentUser.kecamatanId){
        // 3. Pengawas (Diubah ke GET)
        dbSAT.collection('pengawas_paj').where('kecSekolahId','==',currentUser.kecamatanId).get().then(function(snap){
            pengawasList=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            var ap=document.querySelector('.nav-item.active');
            if(ap&&ap.dataset.page==='pengawas-paj')renderPengawasList();
        }).catch(function(e){ console.error("Gagal memuat pengawas:", e); });

        // 4. STUDENTS (Diubah ke GET - Ini yang paling menghemat kuota!)
        dbSAT.collection('students').where('kecamatanId','==',currentUser.kecamatanId).get().then(function(snap){
            students=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            var ap=document.querySelector('.nav-item.active');
            if(ap&&(ap.dataset.page==='data-siswa'||ap.dataset.page==='dashboard'||ap.dataset.page==='presensi-paj'||ap.dataset.page==='denah-paj'||ap.dataset.page==='kartu-paj'))refreshCurrentView();
        }).catch(function(e){ console.error("Gagal memuat siswa:", e); });
        
        // 5. Questions PAJ (Diubah ke GET)
        dbPAJ.collection('questions_paj').where('kecamatanId','==',currentUser.kecamatanId).get().then(function(snap){
            questionsPAJ=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            var ap=document.querySelector('.nav-item.active');
            if(ap&&(ap.dataset.page==='bank-paj'||ap.dataset.page==='print-paj'||ap.dataset.page==='kunci-paj'||ap.dataset.page==='dashboard'))refreshCurrentView();
        }).catch(function(e){ console.error("Gagal memuat soal:", e); });

        // 6. Tokens (Diubah ke GET)
        dbSAT.collection('exam_tokens').where('kecamatanId','==',currentUser.kecamatanId).get().then(function(snap){
            examTokens=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            var ap=document.querySelector('.nav-item.active');
            if(ap&&ap.dataset.page==='token-paj')renderTokenList();
        }).catch(function(e){ console.error("Gagal memuat token:", e); });

        // 7. Results PAJ (Diubah ke GET)
        dbPAJ.collection('exam_results').where('kecamatanId','==',currentUser.kecamatanId).get().then(function(snap){
            results=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            var ap=document.querySelector('.nav-item.active');
            if(ap&&ap.dataset.page==='koreksi-paj')renderKoreksiList();
        }).catch(function(e){ console.error("Gagal memuat hasil:", e); });
        
        // 8. Denah (Diubah ke GET)
        if(currentUser.npsn){
            dbSAT.collection('denah_paj').where('npsn','==',currentUser.npsn).get().then(function(snap){
                savedDenahMap={};
                snap.docs.forEach(function(doc){
                    var d=doc.data();
                    if(d.map){Object.keys(d.map).forEach(function(key){savedDenahMap[key]=d.map[key];});}
                });
                var ap=document.querySelector('.nav-item.active');
                if(ap&&ap.dataset.page==='denah-paj')updateDenahPreview();
            }).catch(function(e){ console.error("Gagal memuat denah:", e); });
        }
    }
}
</script>
