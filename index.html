function getMyQuestions(){
    var raw = questionsPAJ.filter(function(q){
        return q.kecamatanId === currentUser.kecamatanId;
    });
    var letters = ['A','B','C','D'];
    return raw.map(function(q) {
        if(q.type === 'pg' && q.options && Array.isArray(q.options) && !q.optA) {
            letters.forEach(function(L, idx) {
                q['opt'+L] = q.options[idx] || '';
                if(q.optionImages && Array.isArray(q.optionImages)) {
                    q['optImg'+L] = q.optionImages[idx] || '';
                }
            });
        }
        if(q.correctKey && !q.answer) q.answer = q.correctKey;
        if(q.answer && !q.correctKey) q.correctKey = q.answer;
        return q;
    });
}

function handleLogin(){
    var u=document.getElementById('loginUsername').value.trim(),p=document.getElementById('loginPassword').value,btn=document.getElementById('btnLogin');
    if(!u||!p){showToast('Isi NIP dan Password','error');return}
    if(u===SUPER_ADMIN.nip&&p===SUPER_ADMIN.password){currentUser='admin';loginSuccess();return}
    btn.innerHTML='<span class="loading-spinner mr-2"></span>Proses...';btn.disabled=true;
    dbSAT.collection('teachers').get().then(function(snap){
        if(snap.empty){showToast('Database kosong!','error');btn.innerHTML='MASUK';btn.disabled=false;return}
        var found=false;snap.forEach(function(doc){var d=doc.data();if(d.nip==u&&d.password==p){found=true;currentUser=Object.assign({id:doc.id},d)}});
        if(found)loginSuccess();else{showToast('NIP atau Password salah!','error');btn.innerHTML='MASUK';btn.disabled=false}
    }).catch(function(e){showToast('Gagal: '+e.message,'error');btn.innerHTML='MASUK';btn.disabled=false});
}

    if(!kecId||!npsn||!sekolah||!nama||!nip||!jenis||!pass){showToast('Lengkapi semua data','error');return}
    if(pass.length<6){showToast('Password min 6 karakter','error');return}

/* ==================== DENAH DUDUK INTERAKTIF (ATURAN RUANGAN) ==================== */
var denahArranged = []; 
var denahRoomCapacity = []; 

function calculateRoomAllocation(totalStudents) {
    var rooms = [];
    var remaining = totalStudents;
    while (remaining > 0) {
        var count = Math.min(remaining, 20);
        rooms.push({ rows: 5, cols: 4, capacity: 20, count: count });
        remaining -= count;
    }
    return rooms;
}

function generateSpiralMap(rows, cols) {
    var total = rows * cols;
    var map = new Array(total).fill(0);
    var directions = [[0, 1], [1, 0], [0, -1], [-1, 0]]; 
    var dirIdx = 0, r = 0, c = 0;
    for (var i = 1; i <= total; i++) {
        map[r * cols + c] = i;
        var nr = r + directions[dirIdx][0];
        var nc = c + directions[dirIdx][1];
        if (nr < 0 || nr >= rows || nc < 0 || nc >= cols || map[nr * cols + nc] !== 0) {
            dirIdx = (dirIdx + 1) % 4;
            nr = r + directions[dirIdx][0];
            nc = c + directions[dirIdx][1];
        }
        r = nr; c = nc;
    }
    return map;
}

function setupDenahDragDrop(){
    var selectedCell = null;
    function handleCellClick(e) {
        e.preventDefault();
        var clickedCell = e.currentTarget;
        if (!selectedCell) {
            selectedCell = clickedCell;
            clickedCell.style.outline = "3px solid #ef4444";
            clickedCell.style.boxShadow = "0 0 10px rgba(239, 68, 68, 0.5)";
        } else if (selectedCell === clickedCell) {
            selectedCell.style.outline = ""; selectedCell.style.boxShadow = ""; selectedCell = null;
        } else {
            var sourceRoomIdx = parseInt(selectedCell.getAttribute('data-room'));
            var sourceIdx = parseInt(selectedCell.getAttribute('data-idx'));
            var targetRoomIdx = parseInt(clickedCell.getAttribute('data-room'));
            var targetIdx = parseInt(clickedCell.getAttribute('data-idx'));

            if (sourceRoomIdx !== targetRoomIdx) {
                showToast('Tidak bisa menukar antar ruangan!', 'error');
                selectedCell.style.outline = ""; selectedCell.style.boxShadow = ""; selectedCell = null; return;
            }

            var temp = denahArranged[targetRoomIdx][targetIdx];
            denahArranged[targetRoomIdx][targetIdx] = denahArranged[targetRoomIdx][sourceIdx];
            denahArranged[targetRoomIdx][sourceIdx] = temp;

            var srcHtml = selectedCell.innerHTML;
            var tgtHtml = clickedCell.innerHTML;
            var srcClass = selectedCell.className;
            var tgtClass = clickedCell.className;

            clickedCell.innerHTML = srcHtml;
            clickedCell.className = srcClass;
            selectedCell.innerHTML = tgtHtml;
            selectedCell.className = tgtClass;

            selectedCell.style.outline = ""; selectedCell.style.boxShadow = "";
            showToast('Posisi siswa berhasil ditukar!', 'success');
            selectedCell = null;
        }
    }
    document.querySelectorAll('.denah-cell, .denah-cell-empty').forEach(function(cell) {
        cell.addEventListener('click', handleCellClick);
    });
}

    '</div>'+

function generateRandomToken(length) {
    var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // Dihindiri 0, O, 1, I agar tidak membingungkan siswa
    var token = '';
    for (var i = 0; i < length; i++) {
        token += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return token;
}

function generateToken(){
    var mapel = document.getElementById('tokenMapel').value;
    var kelas = document.getElementById('tokenKelas').value;
    var rombel = document.getElementById('tokenRombel').value;
    var durasi = parseInt(document.getElementById('tokenDurasi').value) || 60; // Default 60 menit jika kosong
    
    if(!mapel || !kelas || !rombel){
        showToast('Pilih Mapel, Kelas, dan Rombel terlebih dahulu!', 'error');
        return;
    }
    
    if(durasi < 5 || durasi > 300){
        showToast('Durasi ujian minimal 5 menit dan maksimal 300 menit!', 'error');
        return;
    }
    
    // Cek apakah ada soal di DB PAJ untuk kombinasi ini
    var myPAJQ = getMyQuestions().filter(function(q){
        return q.mapel === mapel && q.kelas === kelas;
    });
    
    if(myPAJQ.length === 0){
        showToast('Tidak ada soal PAJ untuk '+getMapelName(mapel)+' '+kelas+' di Database! Tambahkan soal terlebih dahulu.', 'error');
        return;
    }
    
    var tokenCode = generateRandomToken(6);
    var btnGenerate = event.target.closest('button');
    btnGenerate.disabled = true;
    btnGenerate.innerHTML = '<span class="loading-spinner mr-2"></span>Membuat Token...';
    
    // Simpan Token ke DB SAT (karena berkaitan dengan manajemen sekolah)
    var tokenData = {
        token: tokenCode,
        mapel: mapel,
        kelas: kelas,
        rombel: rombel,
        npsn: currentUser.npsn,
        kecamatanId: currentUser.kecamatanId,
        createdBy: currentUser.namaGuru,
        totalSoal: myPAJQ.length, // Disimpan agar aplikasi siswa tahu berapa jumlah soalnya
        durasi: durasi, // DURASI DALAM MENIT
        isActive: true,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    
    dbSAT.collection('exam_tokens').add(tokenData).then(function(){
        showToast('Token <b>'+tokenCode+'</b> berhasil dibuat! Durasi: '+durasi+' menit.', 'success');
        btnGenerate.disabled = false;
        btnGenerate.innerHTML = '<i class="fas fa-plus mr-2"></i>Generate 1 Token Baru';
        renderTokenList();
    }).catch(function(e){
        showToast('Gagal membuat token: '+e.message, 'error');
        btnGenerate.disabled = false;
        btnGenerate.innerHTML = '<i class="fas fa-plus mr-2"></i>Generate 1 Token Baru';
    });
}

function renderTokenList(){
    var container = document.getElementById('tokenListContainer');
    if(!container) return;
    
    var myTokens = getMyTokens().filter(function(t){ return t.isActive === true; });
    
    if(!myTokens.length){
        container.innerHTML = '<div class="text-center py-10 text-muted"><i class="fas fa-key text-3xl opacity-30 mb-3 block"></i>Belum ada token aktif.</div>';
        return;
    }
    
    container.innerHTML = myTokens.map(function(t){
        // Format durasi menjadi Jam dan Menit agar lebih rapi
        var jam = Math.floor(t.durasi / 60);
        var menit = t.durasi % 60;
        var durasiText = jam > 0 ? jam + ' Jam ' + menit + ' Menit' : menit + ' Menit';
        
        return '<div class="p-4 bg-dark/30 rounded border border-amber/30 flex flex-col md:flex-row justify-between items-start md:items-center gap-3">'+
            '<div>'+
                '<div class="flex items-center gap-3 mb-1 flex-wrap">'+
                    '<span class="font-mono text-2xl font-bold text-amber tracking-widest bg-black/30 px-4 py-1 rounded border border-amber/50">'+t.token+'</span>'+
                    '<span class="badge badge-blue">'+getMapelName(t.mapel)+'</span>'+
                    '<span class="badge badge-red">'+t.kelas+' - Rombel '+t.rombel+'</span>'+
                    '<span class="badge bg-green-500/15 text-green-400 border border-green-500/30"><i class="fas fa-clock mr-1"></i>'+durasiText+'</span>'+
                '</div>'+
                '<div class="text-xs text-muted ml-1">NPSN: '+t.npsn+' | Soal Tersedia: <span class="text-light font-bold">'+t.totalSoal+'</span> soal | Dibuat: '+((t.createdAt && t.createdAt.toDate) ? t.createdAt.toDate().toLocaleString('id-ID') : '-')+'</div>'+
            '</div>'+
            '<div class="flex gap-2">'+
                '<button onclick="copyToken(\''+t.token+'\')" class="btn-secondary text-xs py-2 px-3 border-blue-500/50 text-blue-400 hover:bg-blue-500/10"><i class="fas fa-copy mr-1"></i>Salin</button>'+
                '<button onclick="deleteToken(\''+t.id+'\',\''+t.token+'\')" class="btn-secondary text-xs py-2 px-3 border-pajRed/50 text-pajRed hover:bg-pajRed/10"><i class="fas fa-ban mr-1"></i>Nonaktifkan</button>'+
            '</div>'+
        '</div>';
    }).join('');
}

function copyToken(token){
    navigator.clipboard.writeText(token).then(function(){
        showToast('Token '+token+' berhasil disalin!', 'success');
    }).catch(function(){
        // Fallback jika clipboard gagal
        var ta = document.createElement("textarea");
        ta.value = token; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        showToast('Token '+token+' berhasil disalin!', 'success');
    });
}

function deleteToken(id, token){
    if(!confirm('Nonaktifkan token "'+token+'"? Siswa tidak bisa menggunakan token ini lagi.')) return;
    dbSAT.collection('exam_tokens').doc(id).update({isActive: false}).then(function(){
        showToast('Token '+token+' dinonaktifkan.', 'success');
    }).catch(function(e){
        showToast('Gagal: '+e.message, 'error');
    });
}

function bulkDeleteTokens(){
    var myTokens = getMyTokens().filter(function(t){ return t.isActive === true; });
    if(!myTokens.length){showToast('Tidak ada token aktif.','error'); return;}
    if(!confirm('NONAKTIFKAN SEMUA ('+myTokens.length+') token ujian PAJ?')) return;
    
    var batch = dbSAT.batch();
    myTokens.forEach(function(t){
        batch.update(dbSAT.collection('exam_tokens').doc(t.id), {isActive: false});
    });
    batch.commit().then(function(){
        showToast('Semua token berhasil dinonaktifkan.', 'success');
    }).catch(function(e){
        showToast('Gagal: '+e.message, 'error');
    });
}

var currentEditResId = null;
var tempUraianScores = {}; // Menyimpan sementara nilai uraian per soal sebelum disimpan

function openEditNilaiModal(resId){
    currentEditResId = resId;
    tempUraianScores = {};
    
    var r = results.find(function(x){ return x.id === resId; });
    if(!r){showToast('Data hasil tidak ditemukan!','error'); return;}
    
    var s=students.find(function(st){return st.id===r.studentId||st.id===r.userId||st.nisn===r.studentNisn||st.nisn===r.nisn});
    var nama=s?s.nama:(r.namaSiswa||r.studentName||r.name||'-');
    
    // Ambil daftar soal sesuai mapel di token ujian
    var examQuestions = getMyQuestions().filter(function(q){ return q.mapel === r.mapel && q.kelas === r.kelas; });
    var answers = r.answers || {}; // Objek berisi { idSoal: 'A' } atau { idSoal: 'text uraian' }
    
    var valPG = r.nilaiPG||r.scorePG||r.pgScore||r.pg||0;
    var existingUraianScores = r.uraianScores || {}; // Jika sebelumnya sudah pernah disimpan sebagian
    
    var body = document.getElementById('editModalContent');
    var h = '<div class="bg-blue-500/10 border border-blue-500/30 p-4 rounded mb-6"><h4 class="text-light font-bold"><i class="fas fa-user mr-2 text-blue-400"></i>'+escHtml(nama)+'</h4><div class="text-xs text-muted mt-1">Mapel: '+getMapelName(r.mapel)+' | No. Peserta: '+(r.pesertaUjian||'-')+' | Nilai PG Otomatis: <b class="text-light">'+Math.round(valPG)+'</b></div></div>';
    
    h += '<h5 class="text-light font-bold mb-3 border-b border-border pb-2"><i class="fas fa-list-ol mr-2 text-pajRed"></i>Daftar Soal, Kunci, dan Jawaban Siswa</h5>';
    
    if(!examQuestions.length){
        h += '<div class="text-center text-pajRed py-4">Soal tidak ditemukan di Bank Soal untuk mapel/kelas ini.</div>';
    } else {
        examQuestions.forEach(function(q, idx){
            var ansVal = answers[q.id] || '-';
            var isPG = q.type === 'pg';
            var kunci = (q.correctKey || q.answer || '-').toUpperCase();
            
            h += '<div class="mb-6 p-4 bg-dark/40 rounded-lg border border-border">';
            h += '<div class="flex items-center gap-2 mb-2"><span class="bg-pajRed text-white text-xs px-2 py-1 rounded font-bold">Soal '+(idx+1)+'</span><span class="badge '+(isPG?'badge-red':'badge-blue')+'">'+(isPG?'Pilihan Ganda':'Uraian')+'</span></div>';
            
            // Teks Soal
            h += '<p class="text-sm text-light leading-relaxed mb-2">'+escHtml(q.text)+'</p>';
            if(q.image) h += '<img src="'+q.image+'" class="mb-3 rounded max-h-24 border border-border">';
            
            if(isPG){
                // Tampilkan Opsi PG
                h += '<div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3 text-xs">';
                var opts = q.options || [q.optA, q.optB, q.optC, q.optD];
                var letters = ['A','B','C','D'];
                opts.forEach(function(opt, oi){
                    if(!opt && opt !== '') return;
                    var isKunci = letters[oi] === kunci;
                    var isPicked = ansVal.toUpperCase() === letters[oi];
                    var rowCls = 'p-2 rounded border flex items-center gap-2 ';
                    if(isPicked && isKunci) rowCls += 'bg-green-500/20 border-green-500 text-green-400'; // Benar
                    else if(isPicked && !isKunci) rowCls += 'bg-red-500/20 border-red-500 text-red-400'; // Salah
                    else if(isKunci) rowCls += 'bg-blue-500/10 border-blue-500/50 text-blue-300'; // Kunci (tidak dipilih siswa)
                    else rowCls += 'bg-dark/30 border-border text-muted'; // Netral
                    
                    var icon = isKunci ? '<i class="fas fa-key text-[10px]"></i>' : '';
                    var check = isPicked ? '<i class="fas fa-user text-[10px] ml-auto"></i>' : '';
                    
                    h += '<div class="'+rowCls+'"><span class="font-bold w-5">'+letters[oi]+'.</span><span class="flex-1">'+escHtml(opt)+'</span>'+icon+check+'</div>';
                });
                h += '</div>';
            } else {
                // Tampilkan Jawaban Uraian Siswa
                h += '<div class="bg-black/30 border border-border rounded p-3 mb-3"><div class="text-[10px] text-muted uppercase font-bold mb-1">Jawaban Siswa:</div><p class="text-sm text-gray-300 whitespace-pre-wrap">'+(ansVal==='-' ? '<span class="italic text-muted">Tidak dijawab</span>' : escHtml(ansVal))+'</p></div>';
                
                // Input Nilai Uraian Manual
                var defVal = existingUraianScores[q.id] !== undefined ? existingUraianScores[q.id] : '';
                h += '<div class="flex items-center gap-3 bg-amber/5 border border-amber/30 rounded p-2"><label class="text-xs text-amber font-bold whitespace-nowrap">Nilai Uraian (0-100):</label><input type="number" class="input-field w-24 text-center border-amber focus:border-amber" id="urVal-'+q.id+'" value="'+defVal+'" min="0" max="100" placeholder="0" oninput="updateTempAkhir()"></div>';
            }
            h += '</div>';
        });
    }
    
    body.innerHTML = h;
    document.getElementById('editNilaiModalKu').classList.add('active');
    updateTempAkhir(); // Hitung sekali saat modal dibuka
}

function updateTempAkhir(){
    var r = results.find(function(x){ return x.id === currentEditResId; });
    if(!r) return;
    
    var examQuestions = getMyQuestions().filter(function(q){ return q.mapel === r.mapel && q.kelas === r.kelas && q.type === 'uraian'; });
    var pg = r.nilaiPG||r.scorePG||r.pgScore||r.pg||0;
    
    var totalUraian = 0;
    var countUraian = 0;
    examQuestions.forEach(function(q){
        var inp = document.getElementById('urVal-'+q.id);
        if(inp && inp.value !== ''){
            totalUraian += parseFloat(inp.value) || 0;
            countUraian++;
        }
    });
    
    var avgUraian = countUraian > 0 ? Math.round(totalUraian / countUraian) : 0;
    var akhir = Math.round((pg * 0.7) + (avgUraian * 0.3));
    
    // Update footer
    var fPG = document.getElementById('footerPG');
    var fUr = document.getElementById('footerUraian');
    var fAk = document.getElementById('footerAkhir');
    if(fPG) fPG.innerText = Math.round(pg);
    if(fUr) fUr.innerText = avgUraian;
    if(fAk) fAk.innerText = akhir;
}

function closeEditNilaiModal(){
    document.getElementById('editNilaiModalKu').classList.remove('active');
    currentEditResId = null;
    tempUraianScores = {};
}

function saveEditNilai(){
    if(!currentEditResId) return;
    
    var r = results.find(function(x){ return x.id === currentEditResId; });
    if(!r){showToast('Data tidak ditemukan','error'); return;}
    
    var examQuestions = getMyQuestions().filter(function(q){ return q.mapel === r.mapel && q.kelas === r.kelas && q.type === 'uraian'; });
    var pg = r.nilaiPG||r.scorePG||r.pgScore||r.pg||0;
    
    var uraianScoresObj = {};
    var totalUraian = 0;
    var countUraian = 0;
    
    examQuestions.forEach(function(q){
        var inp = document.getElementById('urVal-'+q.id);
        var val = (inp && inp.value !== '') ? (parseFloat(inp.value) || 0) : 0;
        
        // Validasi nilai
        if(val < 0) val = 0;
        if(val > 100) val = 100;
        
        uraianScoresObj[q.id] = val;
        totalUraian += val;
        countUraian++;
    });
    
    var avgUraian = countUraian > 0 ? Math.round(totalUraian / countUraian) : 0;
    var nilaiAkhir = Math.round((pg * 0.7) + (avgUraian * 0.3));
    
    // Simpan ke Database PAJ
    dbPAJ.collection('exam_results').doc(currentEditResId).update({
        nilaiPG: Math.round(pg), scorePG: Math.round(pg),
        nilaiUraian: avgUraian, scoreUraian: avgUraian, essayScore: avgUraian,
        nilaiAkhir: nilaiAkhir, score: nilaiAkhir, finalScore: nilaiAkhir, totalScore: nilaiAkhir,
        uraianScores: uraianScoresObj, // Menyimpan detail nilai per soal uraian
        dikoreksi: true
    }).then(function(){
        showToast('Nilai berhasil disimpan! Akhir: '+nilaiAkhir+' (Rata-rata Uraian: '+avgUraian+')', 'success');
        closeEditNilaiModal();
    }).catch(function(e){
        showToast('Gagal menyimpan: '+e.message, 'error');
    });
}

    var allQ=getMyQuestions(); // Mengambil dari DB PAJ
    if(mapel)allQ=allQ.filter(function(q){return q.mapel===mapel});if(kelas)allQ=allQ.filter(function(q){return q.kelas===kelas});
    if(!allQ.length){container.innerHTML='<div class="text-center py-10 text-muted">Tidak ada soal.</div>';return}
    var h='<table class="w-full text-sm"><thead><tr><th>No</th><th>Tipe</th><th>Soal (Singkat)</th><th class="text-center text-pajRed">Kunci</th></tr></thead><tbody>';
    allQ.forEach(function(q,i){var kt=q.correctKey||q.answer||'-';h+='<tr><td>'+(i+1)+'</td><td><span class="badge '+(q.type==='pg'?'badge-red':'badge-blue')+'">'+q.type.toUpperCase()+'</span></td><td class="truncate max-w-[200px]">'+escHtml(q.text)+'</td><td class="text-center font-bold text-pajRed">'+escHtml(kt)+'</td></tr>'});h+='</tbody></table>';container.innerHTML=h;
}

function printKunci(){
    var mapel=document.getElementById('kunciMapel').value,kelas=document.getElementById('kunciKelas').value;var allQ=getMyQuestions(); // Mengambil dari DB PAJ
    if(mapel)allQ=allQ.filter(function(q){return q.mapel===mapel});if(kelas)allQ=allQ.filter(function(q){return q.kelas===kelas});if(!allQ.length){showToast('Tidak ada soal','error');return}
    var iframe=document.createElement('iframe');iframe.style.cssText='position:fixed;left:-9999px;top:0;width:210mm;height:297mm';document.body.appendChild(iframe);
    var doc=iframe.contentDocument||iframe.contentWindow.document;doc.open();
    doc.write('<!DOCTYPE html><html><head><title>Kunci Jawaban</title><style>@page{size:A4;margin:2cm}body{font-family:"Times New Roman",serif;font-size:11pt;color:#000}table{width:100%;border-collapse:collapse}th,td{border:1px solid #000;padding:8px;text-align:center}th{background:#f0f0f0}td:nth-child(3){text-align:left}</style></head><body><h2 style="text-align:center">KUNCI JAWABAN PAJ</h2><p style="text-align:center">'+getMapelName(mapel)+' - '+kelas+'</p><br><table><thead><tr><th>No</th><th>Tipe</th><th>Soal</th><th>Kunci</th></tr></thead><tbody>');
    allQ.forEach(function(q,i){doc.write('<tr><td>'+(i+1)+'</td><td>'+q.type.toUpperCase()+'</td><td style="text-align:left">'+escHtml(q.text)+'</td><td><b>'+(q.correctKey||q.answer||'-')+'</b></td></tr>')});
    doc.write('</tbody></table></body></html>');doc.close();
    setTimeout(function(){iframe.contentWindow.focus();iframe.contentWindow.print();setTimeout(function(){try{document.body.removeChild(iframe)}catch(e){}},3000)},500);
}

/* ==================== INISIALISASI & REALTIME LISTENER ==================== */
function initApp(){
    // 1. Kecamatan (DB SAT)
    dbSAT.collection('kecamatan').onSnapshot(function(snap){
        kecamatanList=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
        populateRegKecDropdown();
        if(isSuperAdmin() && document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='admin-kecamatan') renderAdminKecamatan(document.getElementById('pageContent'));
    });

    // 2. Guru & Data Sekolah (DB SAT)
    dbSAT.collection('teachers').onSnapshot(function(snap){
        allTeachersCache=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
        var uniqueSchools={};
        allTeachersCache.forEach(function(t){ if(t.npsn && t.namaSekolah && !uniqueSchools[t.npsn]){ uniqueSchools[t.npsn] = {npsn:t.npsn, sekolah:t.namaSekolah, kec:t.kecamatanId}; } });
        allSchoolsList=Object.values(uniqueSchools);
        if(isSuperAdmin() && document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='admin-guru') renderGuruTable();
        if(document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='pengawas-paj') renderPengawasList();
    });
    
    if(currentUser && currentUser.kecamatanId){
        // 3. Pengawas (DB SAT)
        dbSAT.collection('pengawas_paj').where('kecSekolahId', '==', currentUser.kecamatanId).onSnapshot(function(snap){
            pengawasList=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            if(document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='pengawas-paj') renderPengawasList();
        });

        // 4. Siswa (DB SAT)
        dbSAT.collection('students').where('kecamatanId', '==', currentUser.kecamatanId).onSnapshot(function(snap){
            students=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            var activePage = document.querySelector('.nav-item.active');
            if(activePage && (activePage.dataset.page==='data-siswa' || activePage.dataset.page==='dashboard' || activePage.dataset.page==='presensi-paj' || activePage.dataset.page==='denah-paj' || activePage.dataset.page==='kartu-paj')) refreshCurrentView();
        });
        
        // 5. PERBAIKAN UTAMA: Soal PAJ diambil berdasarkan Kecamatan saja (Tanpa filter NPSN)
        dbPAJ.collection('questions_paj').where('kecamatanId', '==', currentUser.kecamatanId).onSnapshot(function(snap){
            questionsPAJ=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            var activePage = document.querySelector('.nav-item.active');
            if(activePage && (activePage.dataset.page==='bank-paj' || activePage.dataset.page==='print-paj' || activePage.dataset.page==='kunci-paj' || activePage.dataset.page==='dashboard')) refreshCurrentView();
        });

        // 6. Token Ujian (DB SAT)
        dbSAT.collection('exam_tokens').where('kecamatanId', '==', currentUser.kecamatanId).onSnapshot(function(snap){
            examTokens=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            if(document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='token-paj') renderTokenList(); // <-- GANTI JADI renderTokenList
        });

        // 7. Hasil Ujian PAJ (DB PAJ)
        dbPAJ.collection('exam_results').where('kecamatanId', '==', currentUser.kecamatanId).onSnapshot(function(snap){
            results=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
            if(document.querySelector('.nav-item.active') && document.querySelector('.nav-item.active').dataset.page==='koreksi-paj') renderKoreksiList(); // <-- SUDAH BENAR
        });
    }
}

window.onload=function(){
    dbSAT.collection('kecamatan').orderBy('createdAt','asc').get().then(function(snap){
        kecamatanList=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
        populateRegKecDropdown();
        showAuth('login');
    }).catch(function(e){
        populateRegKecDropdown();
        showAuth('login');
    });
};
